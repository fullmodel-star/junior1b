<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<!-- 對內版：不要被索引。加密擋得住內容，擋不住「被搜尋到」。 -->
<meta name="robots" content="noindex,nofollow,noarchive">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>英語複習</title>
<meta name="theme-color" content="#1E6E8C">
<link rel="manifest" href="manifest.webmanifest">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<link rel="icon" href="favicon.svg" type="image/svg+xml">
<meta name="apple-mobile-web-app-capable" content="yes">
<link rel="stylesheet" href="ridgeline-ui.css">
<style>
:root{
  /* 稜線識別 · theme-lake（湖藍）— 主色湖藍、紙背＋岩藍墨；狀態色（正確/錯誤/提示/SRS）保留語意 */
  --brand:#2E86A8; --brand2:#1E6E8C; --bg:#F7F3EC; --card:#fff;
  --ink:#141E2B; --muted:#6E8BA3; --ok:#2e9e6b; --bad:#d94b46;
  --line:#E4DDCE; --soft:#E0EAF0; --warn:#c9821a; --gold:#c99a1a; --shadow:none;
  --okbg:var(--okbg); --badbg:var(--badbg); --warnbg:var(--warnbg);
}
@media(prefers-color-scheme:dark){:root:not([data-theme=light]){
  --bg:#141E2B; --card:#1B2838; --ink:#EEF3F6; --muted:#8FA6BC; --line:#2A3A4E; --soft:#22303F;
  --okbg:#123024; --badbg:#3a1620; --warnbg:#3a2c10;
}}
:root[data-theme=dark]{--bg:#141E2B;--card:#1B2838;--ink:#EEF3F6;--muted:#8FA6BC;--line:#2A3A4E;--soft:#22303F;--okbg:#123024;--badbg:#3a1620;--warnbg:#3a2c10;}
*{box-sizing:border-box}
html,body{margin:0;padding:0}
body{
  background:var(--bg); color:var(--ink);
  font-family:system-ui,-apple-system,"Segoe UI","Noto Sans TC","PingFang TC","Microsoft JhengHei",sans-serif;
  -webkit-text-size-adjust:100%; line-height:1.6;
}
#app{max-width:720px;margin:0 auto;padding:0 14px 96px}
/* 稜線 App Bar：頭部＝主題色（--hdr），扁平無漸層無陰影；保留全寬出血＋圓底 */
.rl-appbar{
  padding:calc(env(safe-area-inset-top) + 14px) 16px 14px;
  margin:0 -14px 14px; border-radius:0 0 18px 18px; gap:10px;
}
.rl-appbar .htxt{flex:1;min-width:0}
.rl-appbar .rl-title{font-size:19px;letter-spacing:.5px}
.rl-appbar .rl-sub{margin-top:2px;letter-spacing:.5px}
.backbtn{
  flex:none;width:38px;height:38px;border:0;border-radius:11px;cursor:pointer;
  background:color-mix(in srgb,var(--on) 20%,transparent);color:var(--on);font-size:26px;line-height:1;
  font-family:inherit;display:flex;align-items:center;justify-content:center;
}
.backbtn:hover{background:color-mix(in srgb,var(--on) 32%,transparent)}
.backbtn:focus-visible{outline:3px solid var(--on);outline-offset:2px}
.card{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:14px;margin:0 0 12px}
.card h3{margin:0 0 8px;font-size:15.5px}
.muted{color:var(--muted)}
.center{text-align:center}
.row{display:flex;gap:8px;flex-wrap:wrap}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:10px}
.grid4{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:10px}
.btn{
  appearance:none;border:1px solid var(--brand);background:var(--brand);color:#fff;
  border-radius:11px;padding:11px 14px;font-size:15px;font-weight:600;cursor:pointer;
  font-family:inherit; min-height:44px;
}
.btn:focus-visible{outline:3px solid var(--ink);outline-offset:2px}
.btn.ghost{background:#fff;color:var(--brand)}
.btn.soft{background:var(--soft);color:var(--brand);border-color:var(--soft)}
.btn.sm{padding:7px 11px;font-size:13.5px;min-height:36px;border-radius:9px}
.btn.wide{width:100%}
.btn[disabled]{opacity:.5;cursor:default}
.lessoncard{
  background:#fff;border:1px solid var(--line);border-radius:13px;padding:12px;
  cursor:pointer;text-align:left;font-family:inherit;color:inherit;
}
.lessoncard:hover{border-color:var(--brand)}
.lessoncard .n{font-size:12px;color:var(--brand);font-weight:700}
.lessoncard .t{font-size:15px;font-weight:600;margin-top:1px}
.lessoncard .m{font-size:12px;color:var(--muted);margin-top:4px}
.lessoncard.done{border-color:var(--ok);background:#f4fbf7}
.tabbar{
  position:fixed;left:0;right:0;bottom:0;background:var(--card);border-top:1px solid var(--line);
  display:flex;padding-bottom:env(safe-area-inset-bottom);z-index:20;
}
.tabbar button{
  flex:1;background:none;border:0;padding:9px 2px;font-size:11px;color:var(--muted);
  cursor:pointer;font-family:inherit;display:flex;flex-direction:column;align-items:center;gap:2px;
}
.tabbar button .ic{font-size:19px;line-height:1}
.tabbar button.on{color:var(--brand);font-weight:700}
.toast{
  position:fixed;left:50%;bottom:78px;transform:translate(-50%,14px);
  background:#2b2540;color:#fff;padding:9px 15px;border-radius:20px;font-size:13.5px;
  opacity:0;pointer-events:none;transition:.22s;z-index:60;max-width:88vw;text-align:center;
}
.toast.on{opacity:1;transform:translate(-50%,0)}
.gate{max-width:340px;margin:14vh auto;text-align:center}
.lockbadge{font-size:44px}
.gate input{
  width:100%;padding:12px;border:1px solid var(--line);border-radius:11px;font-size:17px;
  text-align:center;letter-spacing:3px;font-family:inherit;margin:10px 0;
}
.navgrid{display:grid;grid-template-columns:repeat(4,1fr);gap:9px;margin-bottom:12px}
@media(max-width:460px){.navgrid{grid-template-columns:repeat(2,1fr)}}
.navgrid.lesson4{grid-template-columns:repeat(2,1fr)}
.navgrid.lesson4 .navtile{min-height:112px}
.navtile{
  background:var(--card);border:1px solid var(--line);border-radius:14px;padding:14px 8px;
  cursor:pointer;font-family:inherit;color:inherit;text-align:center;
  display:flex;flex-direction:column;align-items:center;gap:3px;min-height:92px;justify-content:center;
}
.navtile.off{opacity:.45;cursor:default}
.navtile.off:hover{border-color:var(--line);background:var(--card)}
.navtile:hover{border-color:var(--brand);background:var(--soft)}
.navtile:focus-visible{outline:3px solid var(--brand);outline-offset:2px}
.navtile .ic{font-size:26px;line-height:1}
.navtile .nm{font-size:14px;font-weight:700;margin-top:2px}
.navtile .sub{font-size:11.5px;color:var(--muted)}
/* 例句（字卡背面 / 拼字回饋） */
.exbox{margin-top:14px;padding:10px 12px;background:var(--soft);border-radius:12px;text-align:left;position:relative}
.exbox .exsay{position:absolute;top:8px;right:8px}
.exen{font-size:15px;line-height:1.6;color:var(--ink)}
.exzh{font-size:13px;color:var(--muted);margin-top:4px}
.hlw{color:var(--brand);font-weight:800}
/* 句中拼字挖空 */
.cloze-sent{font-size:17px;line-height:1.9;margin:6px 0 2px}
.cloze{display:inline-flex;align-items:baseline;font-weight:800;color:var(--brand);
  border-bottom:2px solid var(--brand);padding:0 2px;letter-spacing:1px}
.cloze .clozemid{font-style:normal;color:var(--muted);letter-spacing:2px}
/* 首頁每課四大類總覽 */
.lgrid{grid-template-columns:repeat(3,1fr)}          /* 6 課 → 3×2，左右不留空 */
@media(max-width:720px){.lgrid{grid-template-columns:repeat(2,1fr)}}
@media(max-width:430px){.lgrid{grid-template-columns:1fr}}
.lgcard{display:flex;flex-direction:column;height:100%;text-align:left}
.lghead{display:flex;align-items:baseline;flex-wrap:wrap;gap:4px 8px;margin-bottom:2px;
  padding-bottom:8px;border-bottom:1px solid var(--line)}
.lgname{font-size:13px;font-weight:700;color:var(--brand)}
.lgzh{font-size:14px;font-weight:600;color:var(--ink)}
.lgen{margin-left:auto;font-size:11px;color:var(--muted);font-weight:400}
.lgrow{display:flex;align-items:center;gap:8px;margin-top:7px}
.lglbl{font-size:12.5px;width:64px;flex:0 0 auto;color:var(--ink)}
.lgbar{flex:1;height:7px;background:var(--line);border-radius:99px;overflow:hidden}
.lgbar i{display:block;height:100%;background:var(--brand);border-radius:99px}
.lgbar i.ok{background:var(--ok)}
.lgnum{font-size:12px;color:var(--muted);width:44px;flex:0 0 auto;text-align:right}
/* 錯題分類 chip */
.chip{font-size:12px;padding:4px 10px;border-radius:99px;border:1px solid var(--line);
  background:var(--card);color:var(--ink);cursor:pointer;font-family:inherit;margin:0 6px 6px 0}
.chip:hover{border-color:var(--brand);color:var(--brand)}
/* 課文 */
.txtentry{display:flex;align-items:center;gap:12px;width:100%;text-align:left;cursor:pointer;
  background:var(--card);border:1px solid var(--line);border-radius:14px;padding:14px;
  margin-bottom:12px;font-family:inherit;color:inherit}
.txtentry:hover{border-color:var(--brand);background:var(--soft)}
.txtentry .ic{font-size:28px;flex:0 0 auto}
.txtentry .tx{flex:1;display:flex;flex-direction:column;gap:2px}
.txtentry .tx b{font-size:15px}
.txtentry .tx .sub{font-size:12px;color:var(--muted)}
.txtentry .arr{font-size:24px;color:var(--muted);flex:0 0 auto}
.txtbody .stage{font-size:13px;color:var(--muted);text-align:center;margin:10px 0;font-style:italic}
.dline{display:flex;gap:8px;padding:9px 0;border-bottom:1px dashed var(--line)}
.dline:last-child{border-bottom:0}
.dline .sp{flex:0 0 auto;min-width:56px;font-weight:700;color:var(--brand);font-size:13.5px;padding-top:2px}
.dtext{flex:1}
.len{font-size:15.5px;line-height:1.55;color:var(--ink)}
.len .spk{margin-right:2px}
.lzh{font-size:13px;color:var(--muted);margin-top:3px;line-height:1.5}
.rtitle{font-size:17px;margin:2px 0 10px}
.rtitle .lzh{font-weight:400}
.rpara{padding:8px 0;border-bottom:1px dashed var(--line)}
.rpara:last-child{border-bottom:0}
.txtbody.hidezh .lzh{display:none}
.stat{display:flex;gap:8px}
.stat>div{flex:1;background:var(--soft);border-radius:11px;padding:9px;text-align:center}
.stat .v{font-size:19px;font-weight:700;color:var(--brand)}
.stat .k{font-size:11px;color:var(--muted)}
.bar{height:7px;background:var(--soft);border-radius:5px;overflow:hidden;margin-top:6px}
.bar>i{display:block;height:100%;background:var(--brand);border-radius:5px}
.bar>i.ok{background:var(--ok)}
.seg{display:flex;background:var(--soft);border-radius:10px;padding:3px;gap:3px;margin-bottom:12px}
.seg button{
  flex:1;border:0;background:none;padding:8px;border-radius:8px;font-size:13.5px;
  cursor:pointer;font-family:inherit;color:var(--muted);font-weight:600;min-height:38px;
}
.seg button.on{background:var(--card);color:var(--brand);box-shadow:var(--shadow)}
.zh{font-size:19px;font-weight:600;line-height:1.5}
.en{font-size:17px}
.opt{
  display:block;width:100%;text-align:left;background:var(--card);border:1.5px solid var(--line);
  border-radius:11px;padding:12px;margin:0 0 8px;font-size:15.5px;cursor:pointer;font-family:inherit;
  color:inherit;min-height:46px;
}
.opt:hover{border-color:var(--brand)}
.opt.ok{border-color:var(--ok);background:var(--okbg)}
.opt.bad{border-color:var(--bad);background:var(--badbg)}
.opt[disabled]{cursor:default}
/* 字卡 */
.flip{
  background:var(--card);border:1px solid var(--line);border-radius:18px;min-height:210px;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:22px;text-align:center;cursor:pointer;user-select:none;
}
.flip .big{font-size:29px;font-weight:700;line-height:1.35}
.flip .hint{font-size:12.5px;color:var(--muted);margin-top:12px}
.rate{display:flex;gap:8px;margin-top:12px}
.rate button{flex:1;border-radius:12px;padding:13px 5px;font-size:14px;font-weight:700;
  border:1.5px solid var(--line);background:var(--card);cursor:pointer;font-family:inherit;min-height:48px}
.rate .no{color:var(--bad);border-color:#f2c9c7}
.rate .ok{color:var(--brand);border-color:var(--soft)}
.rate .ez{color:var(--ok);border-color:#bfe6d2}
/* 拼句 */
.slot{
  min-height:62px;border:1.5px dashed var(--line);border-radius:11px;padding:9px;
  display:flex;flex-wrap:wrap;gap:6px;align-content:flex-start;background:var(--card);
}
.slot.ok{border-color:var(--ok);border-style:solid;background:var(--okbg)}
.slot.bad{border-color:var(--bad);border-style:solid;background:var(--badbg)}
.bank{display:flex;flex-wrap:wrap;gap:6px;margin-top:11px}
.tok{
  background:var(--card);border:1.5px solid var(--line);border-radius:9px;padding:7px 11px;
  font-size:15.5px;cursor:pointer;font-family:inherit;color:inherit;min-height:40px;
}
.tok:hover{border-color:var(--brand)}
.tok.used{opacity:.28;pointer-events:none}
.tok.hint{border-color:var(--warn);background:var(--warnbg)}
/* 輸入 */
textarea.ta,input.spell{
  width:100%;padding:12px;border:1.5px solid var(--line);border-radius:11px;font-size:16px;
  font-family:inherit;line-height:1.5;
}
textarea.ta{resize:vertical;min-height:76px}
input.spell{text-align:center;font-size:22px;font-weight:700;letter-spacing:1px}
textarea.ta:focus,input.spell:focus{outline:none;border-color:var(--brand)}
.fb{border-radius:11px;padding:11px;margin-top:10px;font-size:14.5px}
.fb.ok{background:var(--okbg);border:1px solid var(--ok)}
.fb.bad{background:var(--badbg);border:1px solid var(--bad)}
.fb.ask{background:var(--warnbg);border:1px solid var(--warn)}
.ans{font-size:17px;font-weight:600;margin:5px 0}
.pill{
  display:inline-block;background:var(--soft);color:var(--brand);border-radius:20px;
  padding:2px 9px;font-size:11.5px;font-weight:600;margin-right:5px;
}
.pill.g{background:#e8f7ef;color:var(--ok)}
.pill.gold{background:#fdf3dc;color:var(--gold)}
.exline{padding:7px 0;border-top:1px dashed var(--line)}
.exline:first-child{border-top:0}
.pre{white-space:pre-wrap;font-size:14.5px;color:var(--ink)}
.spk{
  background:none;border:0;cursor:pointer;font-size:15px;padding:2px 5px;color:var(--brand);
  font-family:inherit;min-height:32px;
}
.spk.word{min-height:40px;padding:4px 8px;border-radius:8px;color:inherit}
.spk.word:hover{background:var(--soft)}
.spk.word .en{color:var(--ink)}
.hd{display:flex;align-items:center;justify-content:space-between;gap:8px;margin-bottom:10px}
.hd .t{font-size:16px;font-weight:700}
.prog{font-size:12.5px;color:var(--muted)}
/* 文法收放 */
details.acc{border:1px solid var(--line);border-radius:12px;background:var(--card);margin-bottom:10px}
details.acc>summary{
  list-style:none;cursor:pointer;padding:12px 14px;font-weight:700;font-size:15px;
  display:flex;align-items:center;justify-content:space-between;gap:8px;border-radius:12px;
}
details.acc>summary::-webkit-details-marker{display:none}
details.acc>summary::after{content:"▾";color:var(--muted);transition:transform .18s}
details.acc[open]>summary::after{transform:rotate(180deg)}
details.acc[open]>summary{border-bottom:1px solid var(--line);border-radius:12px 12px 0 0}
details.acc .accbody{padding:0 14px 12px}
details.item{border:1px solid var(--line);border-radius:10px;margin:10px 0;background:var(--card)}
details.item>summary{
  list-style:none;cursor:pointer;padding:10px 12px;font-weight:700;font-size:14.5px;color:var(--brand);
  display:flex;align-items:center;justify-content:space-between;gap:8px;
}
details.item>summary::-webkit-details-marker{display:none}
details.item.read>summary{color:var(--ok)}
details.item .ibody{padding:0 12px 12px}
.readbtn{
  width:100%;margin-top:10px;border:1.5px solid var(--line);background:var(--card);color:var(--muted);
  border-radius:10px;padding:10px;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit;min-height:44px;
}
.readbtn.on{background:var(--okbg);border-color:var(--ok);color:var(--ok)}
.hintbox{
  margin-top:10px;background:var(--warnbg);border:1px solid var(--warn);border-radius:10px;
  padding:10px 12px;font-size:15px;letter-spacing:1px;word-break:break-word;
}
#updBar{
  position:fixed;left:0;right:0;top:0;z-index:120;background:var(--brand);color:#fff;
  display:flex;align-items:center;justify-content:center;gap:12px;
  padding:calc(env(safe-area-inset-top) + 9px) 12px 9px;font-size:14px;font-weight:600;
}
#updBar button{
  background:#fff;color:var(--brand);border:0;border-radius:9px;padding:7px 13px;
  font-weight:700;cursor:pointer;font-family:inherit;min-height:36px;
}
@media (prefers-reduced-motion:reduce){*{transition:none!important;animation:none!important}}
</style>
</head>
<body class="theme-lake">
<div id="app"></div>

/* ===== 解密（密碼 = AES-256-GCM 金鑰來源） ===== */
function b64buf(s){var b=atob(s),u=new Uint8Array(b.length);for(var i=0;i<b.length;i++)u[i]=b.charCodeAt(i);return u;}
async function deriveKey(pw,saltB64,iter){
  var km=await crypto.subtle.importKey('raw',new TextEncoder().encode(pw),'PBKDF2',false,['deriveKey']);
  return crypto.subtle.deriveKey({name:'PBKDF2',salt:b64buf(saltB64),iterations:iter,hash:'SHA-256'},
    km,{name:'AES-GCM',length:256},false,['decrypt']);
}
async function decryptData(pw){
  var E=window.ENC,key=await deriveKey(pw,E.salt,E.iter);
  var pt=await crypto.subtle.decrypt({name:'AES-GCM',iv:b64buf(E.iv)},key,b64buf(E.ct));
  return JSON.parse(new TextDecoder().decode(pt));
}

/* ===== 狀態 ===== */

function esc(t){return(t==null?'':''+t).replace(/[&<>]/g,function(c){return{'&':'&amp;','<':'&lt;','>':'&gt;'}[c]})}
function escAttr(t){return(t==null?'':''+t).replace(/[&<>"']/g,function(c){return{'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]})}

  clearTimeout(e._t);e._t=setTimeout(function(){e.classList.remove('on')},1700)}

function today(){var d=new Date();return d.getFullYear()+'-'+('0'+(d.getMonth()+1)).slice(-2)+'-'+('0'+d.getDate()).slice(-2)}
function shuffle(a){a=a.slice();for(var i=a.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));var t=a[i];a[i]=a[j];a[j]=t}return a}
function pct(a,b){return b?Math.round(a/b*100):0}
/* ── 比對用正規化 ──
   2 老師 3 學生實測：727 句中翻英有 121 句(16.6%)正解含縮寫，小孩寫全寫式(do not)全被判錯；
   老師實測 22 個合理別譯有 21 個被誤殺(95%)。所以比對前先把「同一句話的不同寫法」折成同一形。
   ⚠️ 縮寫展開必須在脫撇號之前跑：it's→it is，但所有格 its/Nicole's 不能被動到。 */
var EN_CONTR=[
  [/\bcan['’]?t\b/g,'can not'], [/\bwon['’]?t\b/g,'will not'], [/\bcannot\b/g,'can not'],
  [/\b(do|does|did|is|are|was|were|has|have|had|could|should|would|must)n['’]?t\b/g,'$1 not'],
  [/\b(it|that|what|there|here|he|she|who|where|when|how)['’]s\b/g,'$1 is'],
  [/\blet['’]?s\b/g,'let us'],
  [/\bi['’]m\b/g,'i am'], [/['’]re\b/g,' are'], [/['’]ll\b/g,' will'], [/['’]ve\b/g,' have']];
var NUM_W={zero:0,one:1,two:2,three:3,four:4,five:5,six:6,seven:7,eight:8,nine:9,ten:10,eleven:11,
  twelve:12,thirteen:13,fourteen:14,fifteen:15,sixteen:16,seventeen:17,eighteen:18,nineteen:19,
  twenty:20,thirty:30,forty:40,fifty:50,sixty:60,seventy:70,eighty:80,ninety:90};
var ORD_W={first:1,second:2,third:3,fourth:4,fifth:5,sixth:6,seventh:7,eighth:8,ninth:9,tenth:10,
  eleventh:11,twelfth:12,thirteenth:13,fourteenth:14,fifteenth:15,sixteenth:16,seventeenth:17,
  eighteenth:18,nineteenth:19,twentieth:20,thirtieth:30};
/* 中文寫「二十八」，小孩自然寫 twenty-eight，課本答案卻是 28 → 一律折成數字再比。序數統一成 4th。 */
function numFold(t){
  var w=t.split(' '), out=[], i=0;
  while(i<w.length){
    var x=w[i];
    if(NUM_W[x]!==undefined||ORD_W[x]!==undefined||x==='hundred'){
      var val=0, ord=false;
      while(i<w.length){
        var y=w[i];
        if(NUM_W[y]!==undefined){ val+=NUM_W[y]; i++; }
        else if(y==='hundred'){ val=(val||1)*100; i++; }
        else if(ORD_W[y]!==undefined){ val+=ORD_W[y]; ord=true; i++; break; }
        else break;
      }
      out.push(val+(ord?'th':''));
    }
    else if(/^\d+(st|nd|rd|th)$/.test(x)){ out.push(parseInt(x,10)+'th'); i++; }
    else { out.push(x); i++; }
  }
  return out.join(' ');
}
function normEn(s){
  var t=(s||'').toLowerCase();
  EN_CONTR.forEach(function(p){ t=t.replace(p[0],p[1]) });
  t=t.replace(/[.,!?;:"()“”'’‘]/g,'').replace(/[-–—]/g,' ').replace(/\s+/g,' ').trim();
  return numFold(t);
}
function words(s){ return normEn(s).split(' ').filter(Boolean); }

/* 編輯距離：用來判斷「只是拼錯一兩個字母」 */
function editDist(a,b){
  var m=a.length,n=b.length,d=[],i,j;
  for(i=0;i<=m;i++){d[i]=[i]}
  for(j=0;j<=n;j++){d[0][j]=j}
  for(i=1;i<=m;i++)for(j=1;j<=n;j++){
    d[i][j]=Math.min(d[i-1][j]+1,d[i][j-1]+1,d[i-1][j-1]+(a[i-1]===b[j-1]?0:1));
  }
  return d[m][n];
}
/* 拼字診斷：告訴孩子錯在哪，而不是只丟正解 */
function spellDiff(got,want){
  var g=normEn(got), w=normEn(want);
  if(!g||g===w) return '';
  var d=editDist(g,w);
  if(d===1) return '<div class="muted" style="font-size:13px;margin-top:5px">只差一個字母，很接近了！</div>';
  if(d===2) return '<div class="muted" style="font-size:13px;margin-top:5px">差兩個字母，再看一次拼法。</div>';
  if(g.length!==w.length && g.replace(/s$/,'')===w.replace(/s$/,''))
    return '<div class="muted" style="font-size:13px;margin-top:5px">字尾的 s 要注意。</div>';
  return '';
}

/* 例句裡把目標字highlight起來（字卡背面用） */
function hlWord(sent, enField){
  var e=esc(sent);
  var forms=(enField||'').split(/[\/;]/).map(function(s){return s.trim()}).filter(Boolean);
  for(var i=0;i<forms.length;i++){
    try{
      var re=new RegExp('\\b'+forms[i].replace(/[.*+?^${}()|[\]\\]/g,'\\$&')+'\\b','i');
      if(re.test(e)) return e.replace(re,function(m){return '<b class="hlw">'+m+'</b>'});
    }catch(_){}
  }
  return e;
}
/* 句中拼字：把目標字挖空、留首尾字母 */
function spellBlankHtml(w){
  if(w.length<=1) return '<span class="cloze">'+esc(w)+'</span>';
  if(w.length===2) return '<span class="cloze">'+esc(w[0])+esc(w[1])+'</span>';
  return '<span class="cloze">'+esc(w[0])+'<i class="clozemid">'+
         new Array(w.length-1).join('_')+'</i>'+esc(w[w.length-1])+'</span>';
}
function clozeSentence(sent, enField){
  var e=esc(sent), out={html:e, form:'', hit:false};
  var forms=(enField||'').split(/[\/;]/).map(function(s){return s.trim()}).filter(Boolean);
  for(var i=0;i<forms.length;i++){
    if(!forms[i]) continue;
    try{
      var re=new RegExp('\\b'+forms[i].replace(/[.*+?^${}()|[\]\\]/g,'\\$&')+'\\b','i');
      var m=e.match(re);
      if(m){ out.html=e.replace(re, spellBlankHtml(m[0])); out.form=m[0]; out.hit=true; break; }
    }catch(_){}
  }
  return out;
}
/* 句子診斷：逐詞比對，指出少了/多了/拼錯哪個字 */
function sentDiff(got,want){
  var g=words(got), w=words(want);
  if(!g.length) return '';
  var gs={}, ws={};
  g.forEach(function(x){gs[x]=(gs[x]||0)+1});
  w.forEach(function(x){ws[x]=(ws[x]||0)+1});
  var missing=[], extra=[];
  Object.keys(ws).forEach(function(x){ var n=(ws[x]||0)-(gs[x]||0); while(n-->0) missing.push(x); });

  // 少一個又多一個，且長得很像 → 是拼錯，不是漏字
  var typos=[];
  for(var i=missing.length-1;i>=0;i--){
    for(var j=extra.length-1;j>=0;j--){
      if(editDist(missing[i],extra[j])<=2){
        typos.push([extra[j],missing[i]]);
        missing.splice(i,1); extra.splice(j,1); break;
      }
    }
  }
  var tips=[];
  if(typos.length) tips.push('拼錯：'+typos.map(function(p){return esc(p[0])+' → <b>'+esc(p[1])+'</b>'}).join('、'));
  if(missing.length) tips.push('少了：<b>'+missing.map(esc).join(' ')+'</b>');
  if(extra.length) tips.push('多了：'+extra.map(esc).join(' '));
  if(!tips.length && g.length===w.length) tips.push('每個字都對，是<b>順序</b>不一樣。');
  if(!tips.length) return '';
  return '<div style="font-size:13.5px;margin-top:7px;line-height:1.8">'+tips.join('<br>')+'</div>';
}

/* ===== 挖空關鍵字（總複習改版，2026-07-21）=====
   中翻英/句型轉換原本要求整句手打、逐字嚴格比對，小孩實測回報「每個句子都要打字，很浪費時間」。
   找教育心理/UX/資深國中老師三位專家＋模擬小孩視角一起看過，結論一致：真正有鑑別度的是
   「會錯的那幾個字」（動詞變化/介系詞/時態），不是整句每個字都要打對——其餘部分重複打
   只是打字練習，不是英文練習，還常常因為標點/大小寫這種無關緊要的地方被整句判死。
   改法：只挖空 1-2 個關鍵字，其餘句子照樣顯示、只比對挖空處，鑑別度不變、打字量大減。
   單字/片語拼寫與 12 題雙空格文法維持原樣不動（那是老闆刻意要的、四人也都同意該硬）。 */
var BLANK_STOP=new Set(['a','an','the','i','you','he','she','it','we','they','me','him','her','us','them',
  'my','your','his','its','our','their','this','that','these','those','am','is','are','was','were','be','been','being',
  'do','does','did','dont',"don't",'doesnt',"doesn't",'didnt',"didn't",'will','would','can','could','shall','should','may','might','must',
  'in','on','at','to','of','for','with','by','from','about','into','onto','over','under','between','among','through','during','after','before','above','below',
  'and','but','or','so','because','if','when','while','than','not','no','there','here','very','too','also','just',
  'every','each','some','any','all','many','much','few','little','more','most']);
var BLANK_VERBS=new Set(['go','goes','went','gone','have','has','had','eat','eats','ate','eaten','get','gets','got','make','makes','made',
  'take','takes','took','taken','give','gives','gave','given','see','sees','saw','seen','come','comes','came','know','knows','knew','known',
  'think','thinks','thought','want','wants','wanted','need','needs','needed','use','uses','used','like','likes','liked',
  'feel','feels','felt','find','finds','found','tell','tells','told','become','becomes','became','leave','leaves','left',
  'put','puts','mean','means','meant','keep','keeps','kept','let','lets','begin','begins','began','begun','seem','seems','seemed',
  'help','helps','helped','show','shows','showed','shown','hear','hears','heard','play','plays','played','run','runs','ran',
  'move','moves','moved','live','lives','lived','believe','believes','believed','bring','brings','brought','write','writes','wrote','written',
  'sit','sits','sat','stand','stands','stood','lose','loses','lost','pay','pays','paid','meet','meets','met','read','reads',
  'buy','buys','bought','send','sends','sent','build','builds','built','spend','spends','spent','grow','grows','grew','grown',
  'win','wins','won','fall','falls','fell','fallen','cut','cuts','understand','understands','understood','speak','speaks','spoke','spoken',
  'teach','teaches','taught','drive','drives','drove','driven','drink','drinks','drank','drunk','sing','sings','sang','sung',
  'swim','swims','swam','swum','fly','flies','flew','flown','sleep','sleeps','slept','wake','wakes','woke','woken',
  'break','breaks','broke','broken','choose','chooses','chose','chosen','catch','catches','caught','wear','wears','wore','worn',
  'ride','rides','rode','ridden','sell','sells','sold','study','studies','studied','stop','stops','stopped','start','starts','started',
  'watch','watches','watched','walk','walks','walked','talk','talks','talked','open','opens','opened','close','closes','closed',
  'clean','cleans','cleaned','cook','cooks','cooked','wash','washes','washed','visit','visits','visited','practice','practices','practiced',
  'finish','finishes','finished','enjoy','enjoys','enjoyed','listen','listens','listened','worry','worries','worried']);
function tok(s){ return (s||'').match(/[A-Za-z']+|[0-9]+:[0-9]+|[0-9]+|[^\sA-Za-z0-9']/g)||[]; }
function isWordTok(t){ return /^[A-Za-z']+$/.test(t); }
/* 依挖空 index 集合把 token 陣列組回句子 HTML，挖空處畫成底線空格 */
function renderBlankHtml(tokens, blankIdx){
  var bi=new Set(blankIdx), html='';
  tokens.forEach(function(t,i){
    var noSpaceBefore=/^[.,!?;:]$/.test(t);
    if(i>0 && !noSpaceBefore) html+=' ';
    html+= bi.has(i) ? '<span style="display:inline-block;min-width:2.4em;border-bottom:2px solid var(--brand);color:var(--muted)">＿＿</span>' : esc(t);
  });
  return html;
}
/* 中翻英：從目標句挑 1-2 個「該考的字」——優先動詞，其次最長的內容字，跳過冠詞/代名詞/介系詞這些猜不猜都無所謂的字 */
function pickBlankWords(tokens){
  var idxs=[]; tokens.forEach(function(t,i){ if(isWordTok(t)) idxs.push(i); });
  var content=idxs.filter(function(i){ return !BLANK_STOP.has(tokens[i].toLowerCase()); });
  if(!content.length) content=idxs.slice();
  if(!content.length) return [];
  var verbIdx=content.filter(function(i){ return BLANK_VERBS.has(tokens[i].toLowerCase()); });
  var primary=verbIdx.length? verbIdx[0] : content.reduce(function(a,b){ return tokens[b].length>tokens[a].length?b:a; }, content[0]);
  var chosen=[primary];
  if(idxs.length>=6){
    var rest=content.filter(function(i){ return i!==primary; });
    if(rest.length){
      var second=rest.reduce(function(a,b){ return tokens[b].length>tokens[a].length?b:a; }, rest[0]);
      chosen.push(second);
    }
  }
  chosen.sort(function(a,b){return a-b;});
  return chosen;
}
/* 句型轉換：原句跟改寫句逐詞比對，抓「真的改變的那一段」（共同前綴+共同後綴中間的落差），
   只挖那一段裡的字——這就是轉換的考點本身（如插入 don't、動詞還原、疑問句字序），不用猜。
   落差太大（幾乎整句都不同，通常是複雜疑問句字序全變）就不硬挖，退回整句打（見 fRunSForm 的呼叫端）。 */
function diffBlankRange(srcTok,dstTok){
  var p=0, maxP=Math.min(srcTok.length,dstTok.length);
  while(p<maxP && srcTok[p].toLowerCase()===dstTok[p].toLowerCase()) p++;
  var s=0, maxS=Math.min(srcTok.length-p, dstTok.length-p);
  while(s<maxS && srcTok[srcTok.length-1-s].toLowerCase()===dstTok[dstTok.length-1-s].toLowerCase()) s++;
  var start=p, end=Math.max(p, dstTok.length-s), blankIdx=[];
  for(var i=start;i<end;i++) if(isWordTok(dstTok[i])) blankIdx.push(i);
  return blankIdx;
}

var NINJA_APP='junior1b';

/* ===== SRS 學習層（比照國中2000）：box 1..6，box>=5 視為精熟 ===== */
var BOX_DAYS=[0,0,1,2,4,7,15];
function srsKey(cat,en){return (cat==='vocab'?'W:':'P:')+en}
function srsOf(cat,en){return S.srs[srsKey(cat,en)]||null}
/* 純粹推進學習盒，不碰統計與 XP（給測驗與字卡共用） */
function applySrs(cat,en,kind){
  var k=srsKey(cat,en);
  var e=S.srs[k]||{box:1,due:0,seen:0,correct:0,wrong:0,star:false};
  e.seen++;
  if(kind==='no'){ e.box=1; e.wrong++; e.due=Date.now()+10*60*1000; }
  else if(kind==='ok'){ e.box=Math.min(6,e.box+1); e.correct++; e.due=Date.now()+BOX_DAYS[e.box]*864e5; }
  else { e.box=Math.min(6,e.box+2); e.correct++; e.due=Date.now()+BOX_DAYS[e.box]*864e5; }
  S.srs[k]=e;
  return e;
}
/* 字卡自評：推進學習盒 ＋ 計入當日統計與 XP */
function applyRate(cat,en,kind){
  applySrs(cat,en,kind);
  bumpDay(kind!=='no');
  if(kind!=='no'){ try{Ninja.gain(10,NINJA_APP,{correct:1})}catch(err){} }
  save();
}
function masteredCount(cat,lesson){

  return n;

/* ===== 錯題層：連對 2 次才畢業，但「不能偷懶」=====
   ⚠️ 防偷懶核心：①只有「打字答對」能直接累計畢業進度（打字不能刪去法猜）；
      ②任何「選擇題答對」只有跨場次才算一次（擋同場次背對背刷 + 擋四選一猜）。
   → 錯題重考一律改成打字（見 startReview）。1b 沒有閱讀題，所以沒有「選擇＋跨場次」的閱讀路徑。 */
var WBOX_MIN=[0,10,1440,4320];   // box1=10分 box2=1天 box3=3天
var SESSION='s'+Date.now();      // 一次頁面載入＝一個場次
function normWrong(p){ p.dirs=p.dirs||{}; p.rev=p.rev||{streak:0,lastSess:''}; return p; }
function isTypingDir(dir){ return dir==='spell'||dir==='gramFill'||dir==='trans'||dir==='sform'; }
function addWrong(id, meta, dir, soft){
  dir=dir||'en2zh';
  var ex=S.wrong[id];
  if(soft){ // 字卡自評「不會」：只更新次數，不重置測驗累積的畢業進度
    if(ex){ ex.n=(ex.n||0)+1; ex.ts=Date.now(); save(); return; }
  }
  var p=normWrong(ex||{n:0});
  p.cat=meta.cat; p.lesson=meta.lesson; p.en=meta.en; p.zh=meta.zh;
  p.n=(p.n||0)+1; p.ts=Date.now();
  p.dirs[dir]=p.dirs[dir]||{w:false,streak:0};
  p.dirs[dir].w=true;
  if(!soft){ p.dirs[dir].streak=0; p.rev.streak=0; p.graduated=false; p.box=1; p.due=Date.now(); }
  else { p.box=p.box||1; p.due=p.due||Date.now(); p.graduated=false; }
  S.wrong[id]=p; save();
}
function markCorrect(id, dir){
  var p=S.wrong[id]; if(!p||p.graduated) return;
  p=normWrong(p);
  p.dirs[dir]=p.dirs[dir]||{w:false,streak:0};
  p.dirs[dir].streak=(p.dirs[dir].streak||0)+1;   // 保留方向別紀錄（相容）
  if(isTypingDir(dir)){
    p.rev.streak=(p.rev.streak||0)+1;              // 打字：直接算
  } else if(p.rev.lastSess!==SESSION){
    p.rev.streak=(p.rev.streak||0)+1; p.rev.lastSess=SESSION;   // 選擇：跨場次才算
  }
  p.box=Math.min((p.box||1)+1,3);
  p.due=Date.now()+(WBOX_MIN[p.box]||10)*60000;
  if((p.rev.streak||0)>=2){ p.graduated=true; p.graduatedTs=Date.now(); }
  S.wrong[id]=p; save();
}
function wrongActive(cat){
  return Object.keys(S.wrong).filter(function(k){
    var w=S.wrong[k];
    return !w.graduated && (!cat || w.cat===cat);
  });
}
function wrongDue(cat){
  var now=Date.now();
  return wrongActive(cat).filter(function(k){return (S.wrong[k].due||0)<=now});
}

/* 每日統計 / 連續天數 */
function bumpDay(ok){
  S.stat.ans++; if(ok) S.stat.ok++;
  var d=today();
  S.days[d]=(S.days[d]||0)+1;
  if(S.lastDay!==d){
    var y=new Date(Date.now()-864e5);
    var ys=y.getFullYear()+'-'+('0'+(y.getMonth()+1)).slice(-2)+'-'+('0'+y.getDate()).slice(-2);
    S.streak=(S.lastDay===ys)?(S.streak+1):1;
    S.lastDay=d;
  }
}
/* 測驗／中翻英作答共同收斂點 */
function markResult(cat, id, ok, meta, dir){
  bumpDay(ok);
  if(ok){ try{Ninja.gain(10,NINJA_APP,{correct:1})}catch(e){} }
  S.seen[id]=1;
  if(ok) markCorrect(id, dir||'en2zh');
  else addWrong(id, Object.assign({cat:cat},meta), dir||'en2zh');
  // 測驗也要推進學習盒。否則只做測驗、不翻字卡的孩子，
  // 首頁「已學會」永遠掛 0，單字旁的等級徽章也永遠不動。
  if(cat==='vocab'||cat==='phrase'){
    applySrs(cat, meta.en, ok?'ok':'no');
  }
  save();
}

/* ===== 課文（對話＋閱讀，中英對照、可朗讀、可隱藏中文自測） ===== */
function viewText(){
  var lid=VIEW.lesson;
  var L=lessonsOf().filter(function(x){return x.id===lid})[0]||{name:'Lesson '+lid};
  var txt=lessonText(lid);
  if(!txt){ return go('lesson',{lesson:lid}); }
  var hasD=txt.dialogue&&txt.dialogue.lines&&txt.dialogue.lines.length;
  var hasR=txt.reading&&txt.reading.paras&&txt.reading.paras.length;
  var sub=VIEW.sub || (hasD?'d':'r');
  if(sub==='d'&&!hasD) sub='r';
  if(sub==='r'&&!hasR) sub='d';
  var showZh=(S.txtZh!==false);
  var h=head(L.name+'　課文', L.zh||L.topic||'');
  // 對話/閱讀切換
  if(hasD&&hasR){
    h+='<div class="seg"><button data-s="d" class="'+(sub==='d'?'on':'')+'">💬 對話</button>'+
       '<button data-s="r" class="'+(sub==='r'?'on':'')+'">📄 閱讀</button></div>';
  }
  // 顯示/隱藏中文 + 讀過
  var rkey='txt:L'+lid+':'+sub;
  h+='<div class="row" style="margin-bottom:4px">'+
     '<button class="btn sm ghost" id="zhtog">'+(showZh?'🙈 隱藏中文':'👁 顯示中文')+'</button>'+
     '<button class="btn sm '+(S.read[rkey]?'':'soft')+'" id="rdtog">'+(S.read[rkey]?'✅ 讀過':'標記讀過')+'</button></div>';
  h+='<div class="card txtbody'+(showZh?'':' hidezh')+'">';
  if(sub==='d'){
    txt.dialogue.lines.forEach(function(ln,i){
      if(!ln.en){ // 舞台指示（在學校…）
        h+='<div class="stage">'+esc(ln.zh||ln.sp||'')+'</div>'; return;
      }
      h+='<div class="dline">'+
         (ln.sp?'<span class="sp">'+esc(ln.sp)+'</span>':'')+
         '<div class="dtext"><div class="len"><button class="spk" data-say="'+escAttr(ln.en)+'">🔊</button>'+
         '<span>'+esc(ln.en)+'</span></div>'+
         '<div class="lzh">'+esc(ln.zh||'')+'</div></div></div>';
    });
  } else {
    if(txt.reading.title_en) h+='<h3 class="rtitle">'+esc(txt.reading.title_en)+
       (txt.reading.title_zh?'<span class="lzh">'+esc(txt.reading.title_zh)+'</span>':'')+'</h3>';
    txt.reading.paras.forEach(function(p){
      h+='<div class="rpara"><div class="len"><button class="spk" data-say="'+escAttr(p.en)+'">🔊</button>'+
         '<span>'+esc(p.en).replace(/\n/g,'<br>')+'</span></div>'+
         '<div class="lzh">'+esc(p.zh||'').replace(/\n/g,'<br>')+'</div></div>';
    });
  }
  h+='</div>';
  app.innerHTML=h;
  Array.prototype.forEach.call(app.querySelectorAll('.seg button'),function(b){
    b.onclick=function(){go('text',{lesson:lid,sub:b.dataset.s})};
  });
  Array.prototype.forEach.call(app.querySelectorAll('[data-say]'),function(b){
    b.onclick=function(){speak(b.dataset.say)};
  });
  document.getElementById('zhtog').onclick=function(){ S.txtZh=!showZh; save(); paint(); };
  document.getElementById('rdtog').onclick=function(){
    if(S.read[rkey]) delete S.read[rkey]; else S.read[rkey]=Date.now();
    save(); paint();
  };
}

/* --- 字卡 --- */
var CARD=null;
function startCard(cat,lesson){
  var arr=itemsOf(cat,lesson);
  // 到期的優先，其次沒學過的，最後其他
  var now=Date.now();
  var due=[],fresh=[],rest=[];
  arr.forEach(function(x){var e=srsOf(cat,x.en);
    if(!e) fresh.push(x); else if(e.due<=now) due.push(x); else rest.push(x);});
  var deck=shuffle(due).concat(shuffle(fresh)).concat(shuffle(rest));
  CARD={deck:deck,i:0,flipped:false,cat:cat,lesson:lesson};
  go('card');
}
function viewCard(){
  if(!CARD||CARD.i>=CARD.deck.length){
    var h=head('字卡完成');
    h+='<div class="card center"><div style="font-size:40px">🎉</div>'+
       '<h3>這一輪 '+(CARD?CARD.deck.length:0)+' 張看完了</h3>'+
       '<div class="row" style="justify-content:center">'+
       '<button class="btn" id="ag">再一輪</button><button class="btn ghost" id="bk">回列表</button></div></div>';
    app.innerHTML=h;
    document.getElementById('bk').onclick=function(){go('vocab',{lesson:CARD.lesson,cat:CARD.cat})};
    document.getElementById('ag').onclick=function(){startCard(CARD.cat,CARD.lesson)};
    return;
  }
  var x=CARD.deck[CARD.i], e=srsOf(CARD.cat,x.en);
  var h=head('字卡','第 '+(CARD.i+1)+' / '+CARD.deck.length+' 張'+(e?'　等級 '+e.box:'　新的字'));
  h+='<div class="card">'+
     '<div class="flip" id="flip">'+
       (CARD.flipped
         ? '<div class="big">'+esc(x.zh)+'</div>'+(x.pos?'<div class="muted" style="margin-top:6px">'+esc(x.pos)+'</div>':'')+
           '<div class="hint">'+esc(x.en)+'</div>'+
           (x.ex?'<div class="exbox"><button class="spk exsay" data-say="'+escAttr(x.ex)+'">🔊</button>'+
                 '<div class="exen">'+hlWord(x.ex,x.en)+'</div>'+
                 '<div class="exzh">'+esc(x.exZh||'')+'</div></div>':'')
         : '<div class="big">'+esc(x.en)+'</div><div class="hint">點一下看中文</div>')+
     '</div>'+
     '<div class="row" style="margin-top:10px;justify-content:center">'+
       '<button class="btn ghost sm" id="say">🔊 發音</button></div>'+
     (CARD.flipped
       ? '<div class="rate"><button class="no" data-k="no">😵 不會</button>'+
         '<button class="ok" data-k="ok">🙂 會了</button>'+
         '<button class="ez" data-k="easy">😎 很簡單</button></div>'
       : '<p class="muted center" style="font-size:12.5px;margin:12px 0 0">翻開後再自評，會排進複習盒</p>')+
     '<div class="bar" style="margin-top:12px"><i style="width:'+pct(CARD.i,CARD.deck.length)+'%"></i></div>'+
     '</div>';
  app.innerHTML=h;
  document.getElementById('flip').onclick=function(){CARD.flipped=!CARD.flipped;paint()};
  document.getElementById('say').onclick=function(){speak(x.en)};
  var exs=app.querySelector('.exsay'); if(exs) exs.onclick=function(ev){ev.stopPropagation();speak(exs.dataset.say)};
  Array.prototype.forEach.call(app.querySelectorAll('[data-k]'),function(b){
    b.onclick=function(){
      var kind=b.dataset.k;
      applyRate(CARD.cat,x.en,kind);
      if(kind==='no') addWrong(x.id,{cat:CARD.cat,lesson:x.lesson,en:x.en,zh:x.zh},'en2zh',true);

var Q=null;
function startQuiz(cat,lesson,dir,items){
  var arr=items||shuffle(itemsOf(cat,lesson));
  if(!arr.length){toast('沒有題目');return}
  var pool=itemsOf(cat,null);
  if(dir!=='spell'&&pool.length<4){toast('題目不足以出選項');return}
  Q={items:arr,i:0,right:0,cat:cat,lesson:lesson,dir:dir,pool:pool,review:!!items};
  go('quiz');
}
function viewQuiz(){
  if(!Q||Q.i>=Q.items.length){
    var h=head('測驗完成');
    h+='<div class="card center"><div style="font-size:40px">'+((Q&&Q.right===Q.items.length)?'🏆':'🎉')+'</div>'+
       '<h3>答對 '+(Q?Q.right:0)+' / '+(Q?Q.items.length:0)+'</h3>'+
       '<button class="btn wide" id="bk">'+(Q&&Q.review?'回複習':'回列表')+'</button></div>';
    app.innerHTML=h;
    document.getElementById('bk').onclick=function(){Q.review?go('review'):go('vocab',{lesson:Q.lesson,cat:Q.cat})};
    return;
  }
  var it=Q.items[Q.i], dir=Q.dir;
  var h=head('測驗','第 '+(Q.i+1)+' / '+Q.items.length+' 題　答對 '+Q.right);
  if(dir==='spell'){
    // 句中拼字：有例句就用例句挖空（留首尾字母），沒有才退回看中文拼
    var cz = it.ex ? clozeSentence(it.ex, it.en) : null;
    var useEx = !!(cz && cz.hit);
    var forms = it.en.split(/[\/;]/).map(function(s){return normEn(s)}).filter(Boolean);
    var answer = useEx ? cz.form : it.en.split(/[\/;]/)[0].trim();
    if(useEx){
      h+='<div class="card"><div class="prog">看句子，把空格的字拼出來</div>'+
         '<div class="exen cloze-sent">'+cz.html+'</div>'+
         (it.exZh?'<div class="exzh">'+esc(it.exZh)+'</div>':'')+
         '<p class="muted" style="font-size:12.5px;margin:8px 0 0">中文：'+esc(it.zh)+'　（'+answer.length+' 個字母，'+esc(answer[0])+'…'+esc(answer[answer.length-1])+'）</p>'+
         '<input class="spell" id="sp" autocomplete="off" autocapitalize="off" spellcheck="false" placeholder="拼出空格的字">'+
         '<button class="btn wide" style="margin-top:10px" id="ck">檢查</button><div id="fb"></div></div>';
    } else {
      h+='<div class="card"><div class="zh">'+esc(it.zh)+'</div>'+
         '<p class="muted" style="font-size:12.5px;margin:4px 0 0">'+answer.length+' 個字母，首字母 '+esc(answer[0])+'</p>'+
         '<input class="spell" id="sp" autocomplete="off" autocapitalize="off" spellcheck="false" placeholder="拼出英文">'+
         '<button class="btn wide" style="margin-top:10px" id="ck">檢查</button><div id="fb"></div></div>';
    }
    app.innerHTML=h;
    var sp=document.getElementById('sp'); sp.focus();
    var chk=function(){
      var got=sp.value.trim(); if(!got){toast('先拼拼看');return}
      var ok=forms.indexOf(normEn(got))>=0;
      sp.disabled=true; document.getElementById('ck').disabled=true;
      if(ok)Q.right++;
      speak(answer);
      markResult(Q.cat,it.id,ok,{lesson:it.lesson,en:it.en,zh:it.zh},'spell');
      document.getElementById('fb').innerHTML='<div class="fb '+(ok?'ok':'bad')+'">'+
        (ok?'✅ 拼對了！':'❌ 正解：<b>'+esc(answer)+'</b>'+spellDiff(got,answer))+'</div>'+
        (useEx?'<div class="muted" style="font-size:13px;margin-top:6px">'+hlWord(it.ex,it.en)+'</div>':'')+
        '<button class="btn wide" style="margin-top:10px" id="nx">下一題</button>';
      document.getElementById('nx').onclick=function(){Q.i++;paint()};
    };
    sp.onkeydown=function(e){if(e.key==='Enter')chk()};
    document.getElementById('ck').onclick=chk;
    return;
  }
  var isE2Z = dir==='en2zh';
  var stem = isE2Z ? it.en : it.zh;
  var right = isE2Z ? it.zh : it.en;
  // 干擾選項要「英文不同、中文也不同」。否則中→英時，同一個中文釋義底下的同義字
  // 會被當成干擾選項——孩子選了一樣正確的答案卻被判錯、還進錯題本。
  var others = Q.pool.filter(function(p){ return p.en!==it.en && p.zh!==it.zh; });
  var opts=shuffle([right].concat(shuffle(others).slice(0,3).map(function(p){return isE2Z?p.zh:p.en})));
  h+='<div class="card">'+
     '<div class="prog">'+(isE2Z?'選出中文意思':'選出英文')+'</div>'+
     '<div class="zh" style="margin:8px 0 14px">'+esc(stem)+
       (isE2Z?' <button class="spk" id="say">🔊</button>':'')+'</div>'+
     opts.map(function(o){return '<button class="opt" data-o="'+escAttr(o)+'">'+esc(o)+'</button>'}).join('')+
     '<div id="fb"></div></div>';
  app.innerHTML=h;
  var sy=document.getElementById('say'); if(sy) sy.onclick=function(){speak(it.en)};
  var done=false;
  Array.prototype.forEach.call(app.querySelectorAll('.opt'),function(b){
    b.onclick=function(){
      if(done)return; done=true;
      var ok=b.dataset.o===right;
      Array.prototype.forEach.call(app.querySelectorAll('.opt'),function(x){
        x.disabled=true;
        if(x.dataset.o===right)x.classList.add('ok');
        else if(x===b)x.classList.add('bad');
      });
      if(ok)Q.right++;
      speak(it.en);
      markResult(Q.cat,it.id,ok,{lesson:it.lesson,en:it.en,zh:it.zh},dir);
      document.getElementById('fb').innerHTML='<div class="fb '+(ok?'ok':'bad')+'">'+
        (ok?'✅ 答對了':'❌ 正解：<b>'+esc(right)+'</b>')+'</div>'+
        '<button class="btn wide" style="margin-top:10px" id="nx">下一題</button>';
      document.getElementById('nx').onclick=function(){Q.i++;paint()};
    };
  });
}

/* ===== 文法 / 句型：收放 + 讀過打勾 ===== */
function readKey(sub,lesson,idx){return sub+':L'+lesson+':'+idx}
function readCount(sub,lesson){
  var arr = sub==='g' ? ((DB.grammar||{})[LK(lesson)]||[]) : ((DB.patterns||{})[LK(lesson)]||[]);
  var n=0;
  for(var i=0;i<arr.length;i++) if(S.read[readKey(sub,lesson,i)]) n++;

}

  var gqb=document.getElementById('gqb'); if(gqb) gqb.onclick=function(){startGramQuiz(lid)};

  Array.prototype.forEach.call(app.querySelectorAll('[data-read]'),function(b){

      var key=b.dataset.read;

/* 三種作答方式：⌨️打字最扎實但花時間、🎯挖空關鍵字介於中間、🧩拼句完全不用打字。
   2026-07-21 老闆糾正：不能讓學生自己選——會一路挑最輕鬆的拼句，練習量看起來做完了、
   實際上沒真的練到「寫得出來」，家長也沒辦法從進度數字判斷小孩到底練了什麼。
   改成系統隨機分配，打字給較高權重(0.5)維持這還是「手寫特訓」為主，其餘兩種當調劑(各0.25)。
   隨機結果算在 startTrans() 開場時一次決定、存在 T.modes（跟 T.items 一一對應，不跟著
   共用的題目物件走），同一題在畫面上重繪不會忽然變另一種模式。 */
function pickPracticeMode(){
  var r=Math.random();
  if(r<0.5) return 'type';
  if(r<0.75) return 'blank';
  return 'build';
}

var T=null;
function startTrans(o){
  o=o||{};
  var pool = o.items || transOf(o.lesson,o.unit);
  if(!pool.length){toast('沒有句子');return}
  var items;
  var ordered = !!(o.lesson && !o.items);   // 課內練習：整課由短到長，不 shuffle
  if(ordered){
    if(o.n){
      // 只做 n 題時，先給還沒練過的，這樣每一輪都往前推，不會一直重複同樣那幾句
      var fresh=pool.filter(function(t){return !S.seen[t.id]});
      items=(fresh.length>=o.n?fresh:fresh.concat(pool.filter(function(t){return S.seen[t.id]}))).slice(0,o.n);
    }else{
      items=pool.slice();
    }
  }else{
    items = o.n ? shuffle(pool).slice(0,o.n) : shuffle(pool);
  }
  T={items:items,i:0,right:0,lesson:o.lesson,review:!!o.items,
     whole:!!(o.lesson && !o.n),
     partial:!!(o.lesson && o.n && o.n<pool.length),
     modes:items.map(pickPracticeMode)};
  go('transRun');
}
function viewTransRun(){
  if(!T||T.i>=T.items.length){
    // 只有「整課」做完才更新該課成績，做 5/10 題的部分練習不覆蓋
    if(T&&T.lesson&&T.whole){
      S.units['L'+T.lesson]={right:T.right,total:T.items.length,ts:Date.now()};
      save();
    }
    var perfect=T&&T.right===T.items.length;
    var h=head('練習完成');
    h+='<div class="card center"><div style="font-size:40px">'+(perfect?'🏆':'🎉')+'</div>'+
       '<h3>答對 '+(T?T.right:0)+' / '+(T?T.items.length:0)+'</h3>'+
       (T&&T.right<T.items.length?'<p class="muted" style="font-size:13.5px">答錯的已收進錯題本，之後會提醒你複習。</p>':'')+
       '<div class="row" style="justify-content:center">'+
       '<button class="btn" id="ag">再一輪</button>'+
       '<button class="btn ghost" id="bk">'+(T&&T.review?'回複習':'回這課')+'</button></div></div>';
    app.innerHTML=h;
    document.getElementById('bk').onclick=function(){
      if(T&&T.review) go('review');
      else if(T&&T.lesson) go('trans',{lesson:T.lesson});
      else go('trans',{picked:1});
    };
    document.getElementById('ag').onclick=function(){
      startTrans({lesson:T.lesson,unit:T.unit,n:(T.lesson?0:T.items.length),items:T.review?T.items:null});
    };
    return;
  }
  var it=T.items[T.i];
  var sub='第 '+(T.i+1)+' / '+T.items.length+' 題　答對 '+T.right;
  if(T.lesson&&T.unit) sub='Lesson '+T.lesson+' 單元 '+T.unit+'　'+sub;
  var h=head('中翻英',sub);
  h+='<div class="card">'+
     // ctx＝拆句時保留的前一句中文。拆句是 build 期為了縮短句子做的，代價是後半句的
     // 代名詞（them/it）失去指涉，照中文直翻一定被判錯 → 把前一句補回來當情境
     (it.ctx?'<div class="muted" style="font-size:12.5px;margin-bottom:4px">（前一句：'+esc(it.ctx)+'）</div>':'')+
     '<div class="zh">'+esc(it.zh)+'</div>'+
     '<div id="work" style="margin-top:12px"></div><div id="fb"></div>'+
     '<div class="bar" style="margin-top:12px"><i style="width:'+pct(T.i,T.items.length)+'%"></i></div></div>';
  app.innerHTML=h;
  // 2026-07-21：三種作答方式系統隨機分配（見 pickPracticeMode），不給學生自己選，
  // 避免一路挑最輕鬆的拼句、練習量灌水。T.modes 在 startTrans() 開場一次決定，
  // 跟 T.items 一一對應，同一題重繪畫面不會忽然變另一種模式。
  var mode=(T.modes&&T.modes[T.i])||'type';
  if(mode==='build') runBuild(it);
  else if(mode==='blank') runBlank(it);
  else runType(it);
}
function nextT(){T.i++;paint()}
function finishT(it, ok){
  if(ok) T.right++;
  speak(it.en);
  markResult('trans', it.id, ok, {lesson:it.lesson,en:it.en,zh:it.zh}, 'trans');
}
function runBuild(it){
  var work=document.getElementById('work'), fb=document.getElementById('fb');
  var chosen=[], hintWord=null;
  var distract=[];
  if(it.tok.length>=4){
    var others=transOf(it.lesson).filter(function(t){return t.id!==it.id});
    var bag=[]; others.forEach(function(t){bag=bag.concat(t.tok)});
    bag=shuffle(bag).filter(function(w){return it.tok.indexOf(w)<0});
    distract=bag.slice(0,2);
  }
  var bank=shuffle(it.tok.concat(distract)).map(function(w,i){return {w:w,i:i}});
  function draw(){
    work.innerHTML='<div class="slot" id="slot">'+chosen.map(function(c,i){
        return '<button class="tok" data-ci="'+i+'">'+esc(c.w)+'</button>'}).join('')+'</div>'+
      '<div class="bank" id="bank">'+bank.map(function(b){
        var used=chosen.some(function(c){return c.i===b.i});
        return '<button class="tok'+(used?' used':'')+'" data-bi="'+b.i+'">'+esc(b.w)+'</button>'}).join('')+'</div>'+
      '<div class="row" style="margin-top:11px">'+
        '<button class="btn" id="ck" '+(chosen.length?'':'disabled')+'>檢查</button>'+
        '<button class="btn ghost sm" id="hint">提示</button>'+
        '<button class="btn ghost sm" id="clr">清空</button></div>'+
      '<div id="hintbox" class="hintbox" style="display:none"></div>';
    Array.prototype.forEach.call(work.querySelectorAll('[data-bi]'),function(b){
      b.onclick=function(){
        var bi=+b.dataset.bi; var t=bank.filter(function(x){return x.i===bi})[0];
        chosen.push(t); draw();
      };
    });
    Array.prototype.forEach.call(work.querySelectorAll('[data-ci]'),function(b){
      b.onclick=function(){chosen.splice(+b.dataset.ci,1);draw()};
    });
    document.getElementById('clr').onclick=function(){chosen=[];draw();showHint()};
    document.getElementById('hint').onclick=function(){
      var nextW=it.tok[chosen.length];
      if(!nextW){showHint('已經排滿了，按「檢查」看看對不對。');return}
      hintWord=nextW; showHint();
      Array.prototype.forEach.call(work.querySelectorAll('[data-bi]'),function(b){
        if(b.textContent===nextW && !b.classList.contains('used')) b.classList.add('hint');
      });
    };
    document.getElementById('ck').onclick=check;
    if(hintWord) showHint();   // 提示留在畫面上，不會一閃就消失
  }
  function showHint(msg){
    var box=document.getElementById('hintbox'); if(!box) return;
    if(msg){ box.innerHTML=esc(msg); box.style.display='block'; return; }
    if(!hintWord){ box.style.display='none'; return; }
    box.innerHTML='💡 下一個字是 <b>'+esc(hintWord)+'</b>';
    box.style.display='block';
  }
  function check(){
    var got=chosen.map(function(c){return c.w}).join(' ');
    var ok = normEn(got)===normEn(it.en);
    document.getElementById('slot').classList.add(ok?'ok':'bad');
    Array.prototype.forEach.call(work.querySelectorAll('.tok'),function(b){b.disabled=true});
    document.getElementById('ck').disabled=true;
    document.getElementById('hint').disabled=true;
    if(ok){
      finishT(it, true);
      fb.innerHTML='<div class="fb ok">✅ 完全正確！</div>'+
        '<button class="btn wide" style="margin-top:10px" id="nx">下一題</button>';
      document.getElementById('nx').onclick=nextT;
      return;
    }
    // 排錯了：告訴他哪裡不一樣，並留一條「這也對」的路
    // （像 write me a card / write a card to me 都對，硬判錯會很挫折）
    fb.innerHTML='<div class="fb bad">❌ 和課本答案不一樣'+
      '<div class="muted" style="font-size:13px;margin-top:6px">你排的</div>'+
      '<div class="ans">'+esc(got)+'</div>'+
      '<div class="muted" style="font-size:13px;margin-top:6px">課本答案</div>'+
      '<div class="ans" style="color:var(--brand)">'+esc(it.en)+'</div>'+
      sentDiff(got,it.en)+'</div>'+

        '<button class="btn wide" id="nx">知道了，下一題</button></div>'+
      '<button class="btn ghost sm wide" style="margin-top:8px" id="also">我這樣寫其實也對</button>';
    document.getElementById('nx').onclick=function(){finishT(it,false);nextT()};
    document.getElementById('also').onclick=function(){finishT(it,true);nextT()};
  }
  draw();
}

/* ===== 複習（錯題本）：依「課」分組，單字/片語/中翻英/文法 各自能練 ===== */
var CATN={vocab:'單字',phrase:'片語',trans:'中翻英',sform:'句型轉換',gram:'文法'};

/* ── 句型轉換（改否定句／改疑問句）──
   老師實測：段考非選的主力是句型轉換，中翻英只佔 5-10%，而這裡原本 0 題。
   ⚠️ 自動生成答案很容易生出錯題（害小孩學錯）→ 只做機械上百分之百可靠的：
   be動詞／助動詞句。一般動詞的 do-support 要判斷主詞單複數＋還原不規則動詞，錯誤率太高，不做。
   排除：多句、逗號/引號、連接詞與從屬子句、主詞含動詞、主詞開頭不認得、含 some（否定要改 any，有例外不敢自動轉）。
   寧可少出題，不能出錯題。 */
var SF_BE={is:"isn't",are:"aren't",am:'am not',was:"wasn't",were:"weren't"};
var SF_AUX={can:"can't",will:"won't",should:"shouldn't",could:"couldn't",would:"wouldn't"};
var SF_NEGRE=/\b(not|n't|never|no|nothing|nobody)\b/i;
var SF_SUBJ=/^(i|you|he|she|it|we|they|this|that|these|those|there|the|a|an|my|your|his|her|our|their)$/i;
var SF_PROPER=null, SF_VERB=null, SF_CACHE=null;
function sfInit(){
  if(SF_PROPER) return;
  // 專有名詞＝「曾在句中（非句首）出現大寫」且「從來沒小寫出現過」。
  // 兩個條件缺一不可：只看「沒小寫過」的話，maybe/finally/wow 這種永遠在句首的字會被誤判成名字
  // → 生出「Am Maybe I sick?」這種垃圾題。真名字（Judy）在別句的句中會出現。
  var low={}, midCap={};
  (DB.translate||[]).forEach(function(t){ t.en.split(/\s+/).forEach(function(x,idx){
    var c=x.replace(/[^A-Za-z']/g,''); if(!c) return;
    if(/^[a-z]/.test(c)) low[c.toLowerCase()]=1;
    else if(/^[A-Z][a-z]/.test(c) && idx>0) midCap[c.toLowerCase()]=1;
  })});
  SF_PROPER={}; Object.keys(midCap).forEach(function(x){ if(!low[x]) SF_PROPER[x]=1 });
  SF_VERB={};
  Object.keys(DB.vocab||{}).forEach(function(k){ (DB.vocab[k]||[]).forEach(function(v){
    if(/動/.test(v.pos||'')) (v.w||'').split(/\s*\/\s*/).forEach(function(x){ SF_VERB[x.toLowerCase()]=1 });
  })});
  'shows show says say thinks think knows know means mean wants want likes like makes make lets let'
    .split(' ').forEach(function(x){ SF_VERB[x]=1 });
}
function sfClean(en){
  if(!/^[A-Z][^?!]*\.$/.test(en)) return false;
  if(/\./.test(en.replace(/\.$/,''))) return false;                 // 內部還有句號 → 是兩句
  if(/[,;:"]/.test(en)) return false;
  if(/\b(and|but|or|because|when|if|that|who|which|so|after|before|while|let's)\b/i.test(en)) return false;
  // some/something/someone… 在否定與疑問要改成 any/anything（國一考點），有例外不敢自動轉 → 整句不生成
  // ⚠️ 一定要用 some\w*：\bsome\b 匹配不到 something，會生出「can't do something」這種錯句
  if(/\b(some|any)\w*\b/i.test(en)) return false;
  if(/\b(already|too)\b/i.test(en)) return false;
  return en.split(/\s+/).length<=11;
}
function sfFind(w){
  for(var i=1;i<=3&&i<w.length;i++){
    var b=w[i].toLowerCase().replace(/[.]/g,'');
    if(!SF_BE[b]&&!SF_AUX[b]) continue;
    var subj=w.slice(0,i);
    for(var j=0;j<subj.length;j++)                                   // 主詞裡有動詞 → 助動詞其實在從屬子句
      if(SF_VERB[subj[j].toLowerCase().replace(/[.]/g,'')]) return null;
    if(!SF_SUBJ.test(subj[0])&&!SF_PROPER[subj[0].toLowerCase()]) return null;
    return {i:i,b:b,subj:subj};
  }
  return null;
}
function sfAll(){
  if(SF_CACHE) return SF_CACHE;
  sfInit(); var out=[];
  (DB.translate||[]).forEach(function(t){
    if(!sfClean(t.en)||SF_NEGRE.test(t.en)) return;
    var w=t.en.split(/\s+/), f=sfFind(w); if(!f) return;
    var rep=SF_BE[f.b]||SF_AUX[f.b];
    out.push({id:'SF:n:'+t.id, kind:'neg', lesson:t.lesson, src:t.en, zh:t.zh,
              en:w.slice(0,f.i).concat(rep, w.slice(f.i+1)).join(' ')});
    var head=f.b[0].toUpperCase()+f.b.slice(1), s=f.subj.slice();
    s[0]=SF_PROPER[s[0].toLowerCase()]?s[0]:s[0][0].toLowerCase()+s[0].slice(1);
    if(s[0].toLowerCase()==='i') s[0]='I';
    out.push({id:'SF:q:'+t.id, kind:'ask', lesson:t.lesson, src:t.en, zh:t.zh,
              en:head+' '+s.join(' ')+' '+w.slice(f.i+1).join(' ').replace(/\.$/,'')+'?'});
  });
  SF_CACHE=out; return out;
}
function sfById(id){ var a=sfAll(); for(var i=0;i<a.length;i++) if(a[i].id===id) return a[i]; return null }
var SF_ASK={neg:'改成否定句', ask:'改成 Yes/No 疑問句'};
/* 2026-07-21：總複習真實覆蓋率。80% 過關看到的 🏆 只代表「這次抽的45題」，
   不代表整個題庫都複習過了（中翻英上千句、文法兩三百題...）——這正是其他家族App
   在 rv2-review-engine 解過的「單元100%但複習75%錯覺」同一個問題。這裡把所有
   會進總複習題目池的類別的「S.seen 過的/全部」加總，秀出真正的覆蓋率。
   （S.seen 由 markResult 統一寫入，不分是單元練習還是總複習答的都算，累加的） */
function finalCoverage(){
  var seen=0, total=0;
  function count(arr){ if(!arr) return; total+=arr.length; arr.forEach(function(x){ if(S.seen[x.id]) seen++; }); }
  count(itemsOf('vocab')); count(itemsOf('phrase'));
  count(DB.translate||[]); count(sfAll());
  var gAll=[];
  lessonsOf().forEach(function(L){
    lessonGQ(L.id).forEach(function(g){gAll.push(g)});
    if(typeof lessonGT==='function') lessonGT(L.id).forEach(function(g){gAll.push(g)});
  });
  count(gAll);
  if(DB.rquiz){
    var rAll=[];
    Object.keys(DB.rquiz).forEach(function(k){ (DB.rquiz[k]||[]).forEach(function(grp){ (grp.questions||[]).forEach(function(q){rAll.push(q)}) }) });
    count(rAll);
  }
  return {seen:seen, total:total, pct: total? Math.round(seen/total*100):0};
}
/* ===== 📚 總複習：階段綜合(每2課) ＋ 期末總複習(全課混合)
   RV2 精神：跨課「越不熟越常出」的加權抽題 ＋ 四類題型交錯 ＋ 選項洗牌 ＋ 80% 精熟閘門
   單課練 100% ≠ 全部熟；這裡專治「熟練錯覺」。中翻英一律打字。 ===== */
function finalScopes(){
  var ids=lessonsOf().map(function(L){return L.id}), out=[], nm=['一','二','三','四','五'];
  for(var i=0;i<ids.length;i+=2){
    var g=ids.slice(i,i+2); if(!g.length) continue;
    out.push({k:'s'+(i/2+1), name:'階段綜合 '+nm[i/2], sub:'Lesson '+g.join('–'), lessons:g, n:30});
  }
  if(ids.length>2) out.push({k:'all', name:'期末總複習', sub:'Lesson '+ids[0]+'–'+ids[ids.length-1]+'　全部混合', lessons:ids, n:45});
  return out;
}
function fW(cat,en){                        // 權重：沒學過/沒精熟/錯過的 → 更常被抽到
  var e=srsOf(cat,en), w=1;
  if(!e) w+=1.5; else { if((e.box||1)<3) w+=1.0; if((e.box||1)>=5) w-=0.5; w+=Math.min(3,(e.wrong||0))*0.7; }
  return Math.max(0.3,w);
}
function fPick(pool,n){                     // 加權、不重複抽樣
  var out=[], p=pool.slice(), i, tot, r, acc, idx;
  while(out.length<n && p.length){
    tot=0; for(i=0;i<p.length;i++) tot+=(p[i]._w||1);
    r=Math.random()*tot; acc=0; idx=p.length-1;
    for(i=0;i<p.length;i++){ acc+=(p[i]._w||1); if(r<=acc){ idx=i; break; } }
    out.push(p.splice(idx,1)[0]);
  }
  return out;
}
/* 文法題能不能改成「自己填」。擋掉三種：
   ①雙空格 a; b、含中文「（不填）」→ 打不出來
   ②答案是 Yes/No 回答或完整句子 → 那是閱讀測驗的選項題，拿掉選項就無解
     （實測：「Did Nancy sleep in the living room? B: ___」要打出「No, she slept in her
      sister's bedroom.」——她睡哪間只有選項才知道） */
function gramTypeable(g){
  var a=((g.options||[])[g.ans]||'');
  if(!/_{2,}|＿/.test(g.q||'') || !a) return false;
  if(/[一-鿿（）]|[;；]/.test(a)) return false;
  if(/^(yes|no)\s*[,.]/i.test(a)) return false;
  if(a.split(/\s+/).length>=5) return false;
  return true;
}
/* 總複習一律「寫得出來」才算會：選擇題只留 12 題雙空格文法（打不出來的那種）。
   老闆實測：小孩選擇題都會、手寫全不會 → 認得出來 ≠ 寫得出來，總複習只考產出。 */
/* 一題會佔用哪些「內容」——用來去重。實測抓到兩種撞題：
   ①有 3 個片語在兩課的片語表各出現一筆 → 同一份考卷會出現兩次一模一樣的題
   ②中翻英要寫的那一句，剛好就是某個單字題的挖空例句 → 兩題互相洩題 */
function fKeys(x){
  var k=[];
  if(x.t==='gram'||x.t==='gfill') k.push('g:'+x.it.id);
  else if(x.cat==='trans') k.push('s:'+normEn(x.it.en));
  else if(x.cat==='sform') k.push('s:'+normEn(x.it.src));   // 原句＝某句中翻英 → 同卷不能兩題都出
  else { k.push('w:'+normEn(x.it.en)); if(x.it.ex) k.push('s:'+normEn(x.it.ex)); }
  return k;
}
function buildFinalItems(sc){
  var has=function(l){return sc.lessons.indexOf(l)>=0};
  var vs=itemsOf('vocab').filter(function(x){return has(x.lesson)});
  vs.forEach(function(x){x._w=fW('vocab',x.en)});
  var ps=itemsOf('phrase').filter(function(x){return has(x.lesson)});
  ps.forEach(function(x){x._w=fW('phrase',x.en)});
  var ts=(DB.translate||[]).filter(function(x){return has(x.lesson)});
  ts.forEach(function(x){x._w=fW('trans',x.en)});
  var sf=sfAll().filter(function(x){return has(x.lesson)});
  sf.forEach(function(x){ var w=S.wrong[x.id]; x._w=1+Math.min(3,(w&&w.n)||0)*0.7; });
  var gs=[]; sc.lessons.forEach(function(l){ lessonGQ(l).forEach(function(g){ gs.push(g) }) });
  gs.forEach(function(x){ var w=S.wrong[x.id]; x._w=1+Math.min(3,(w&&w.n)||0)*0.7; });
  // 老師建議：從中翻英 35% 挪 10% 給句型轉換（段考非選主力題型）
  // ⚠️ 總複習維持「產出為主」（老闆觀察：選擇題都會、手寫全不會）。
  //    文法辨識的補強改到「錯題重考」那條線做（見 startReview / markCorrect 防偷懶）。
  var cats=[{pool:vs, n:Math.round(sc.n*0.30), mk:function(x){return {t:'spell',cat:'vocab',it:x,pool:vs}}},
            {pool:ps, n:Math.round(sc.n*0.15), mk:function(x){return {t:'spell',cat:'phrase',it:x,pool:ps}}},
            {pool:ts, n:Math.round(sc.n*0.25), mk:function(x){return {t:'type',cat:'trans',it:x}}},
            {pool:sf, n:Math.round(sc.n*0.10), mk:function(x){return {t:'sform',cat:'sform',it:x}}},
            {pool:gs, n:Math.round(sc.n*0.20), mk:function(x){return {t:(gramTypeable(x)?'gfill':'gram'),cat:'gram',it:x}}}];
  var seen={}, items=[];
  cats.forEach(function(c){
    var got=0;
    fPick(c.pool, Math.ceil(c.n*1.4)).forEach(function(x){      // 多抽 4 成當備料，去重後才補得回目標題數
      if(got>=c.n) return;
      var it=c.mk(x), ks=fKeys(it);
      if(ks.some(function(k){return seen[k]})) return;
      ks.forEach(function(k){ seen[k]=1 });
      items.push(it); got++;
    });
  });
  return shuffle(items);                    // 交錯：四類題混著出，不讓小孩靠「這頁都是單字」猜
}

function fSave(){
  if(F&&F.review) return;                 // 錯題本借用的作答流程：不要覆蓋掉正式考試的續考存檔
  if(!F){ fClearSave(); return }

    localStorage.setItem('kh1b_fin', JSON.stringify({k:F.sc.k, i:F.i, right:F.right,
      answered:F.answered||0, self:F.self||0, ts:Date.now(),
      ids:F.items.map(function(x){return {t:x.t, c:x.cat, id:x.it.id}})}));

function fResume(){
  var raw; try{ raw=localStorage.getItem('kh1b_fin') }catch(_){ return null }
  if(!raw) return null;
  try{
    var d=JSON.parse(raw);
    if(!d || !d.ids || (Date.now()-d.ts)>86400000*3) return null;      // 放超過 3 天就算了
    var sc=finalScopes().filter(function(s){return s.k===d.k})[0]; if(!sc) return null;
    var by={};
    ['vocab','phrase'].forEach(function(c){ itemsOf(c).forEach(function(x){ by[c+':'+x.id]=x }) });
    (DB.translate||[]).forEach(function(x){ by['trans:'+x.id]=x });
    sfAll().forEach(function(x){ by['sform:'+x.id]=x });
    sc.lessons.forEach(function(l){ lessonGQ(l).forEach(function(g){ by['gram:'+g.id]=g }) });
    var items=[], pools={vocab:itemsOf('vocab'), phrase:itemsOf('phrase')};
    for(var j=0;j<d.ids.length;j++){
      var r=d.ids[j], it=by[r.c+':'+r.id];
      if(!it) return null;                                            // 題庫對不上（改版）→ 放棄續考
      items.push({t:r.t, cat:r.c, it:it, pool:pools[r.c]});

    return {sc:sc, items:items, i:Math.min(d.i,items.length), right:d.right, answered:d.answered, self:d.self};

/* 計分與記錯題。selfOk＝小孩自評「意思一樣只是用詞不同」：不算對（不列入 80% 閘門），但也不進錯題本 */
function fScore(q, ok, selfOk){
  if(q._done) return;  q._done=1;          // 同一題只記一次分（送 Enter 給已 disabled 的框可重複加分）
  if(ok) F.right++;

  if(selfOk){ F.self=(F.self||0)+1; fSave(); save(); return; }
  var it=q.it;
  // 拼錯一個字母、第二次才寫對：分數算他對（他寫得出來），但仍收進錯題本（拼法還不熟，要練）
  var rec = (ok && q._alsoWrong) ? false : ok;
  if(q.t==='gfill') markResult('gram', it.id, rec, {lesson:it.lesson}, 'gramFill');   // 填空打字 → 直接算畢業
  else if(q.t==='gram') markResult('gram', it.id, rec, {lesson:it.lesson}, 'gram');    // 選擇 → 跨場次才算
  else if(q.t==='sform') markResult('sform', it.id, rec, {lesson:it.lesson,en:it.en,zh:it.src}, 'sform');
  else if(q.t==='type') markResult('trans', it.id, rec, {lesson:it.lesson,en:it.en,zh:it.zh}, 'trans');
  else markResult(q.cat, it.id, rec, {lesson:it.lesson,en:it.en,zh:it.zh}, q.t==='spell'?'zh2en':'en2zh');

/* 例句裡的字常變形：noodles / pancakes / moved / gave，光比對原形會挖不到空 */
var F_SLOT="[\\w’']+(?:\\s+[\\w’']+){0,2}?";     // one's / A / ... 的插槽：1~3 個字，非貪婪
var F_IRREG={give:['gave','given'],take:['took','taken'],make:['made'],go:['went','gone'],
  buy:['bought'],keep:['kept'],lead:['led'],swim:['swam','swum'],throw:['threw','thrown'],
  break:['broke','broken'],get:['got','gotten'],put:['put'],read:['read'],write:['wrote','written'],
  eat:['ate','eaten'],come:['came'],do:['did','done'],have:['had'],run:['ran'],sit:['sat'],
  stand:['stood'],teach:['taught'],think:['thought'],wear:['wore','worn'],feel:['felt'],find:['found']};
function fEsc(s){ return s.replace(/[.*+?^${}()|[\]\\]/g,'\\$&'); }
function fInflectAlt(w){
  var o=[w], k=w.toLowerCase();
  if(F_IRREG[k]) o=o.concat(F_IRREG[k]);
  if(/[^aeiou]y$/i.test(w)) o.push(w.slice(0,-1)+'ies', w.slice(0,-1)+'ied');
  if(/e$/i.test(w)) o.push(w.slice(0,-1)+'ing', w+'d', w+'s');
  o.push(w+'s', w+'es', w+'ed', w+'ing');
  return '(?:'+o.map(fEsc).sort(function(a,b){return b.length-a.length}).join('|')+')';
}
/* 由片語組出彈性樣式：吃得下 one's→her、A to B→Taipei to Tainan、(good) 可有可無、play→plays */
function fPhraseRe(p){
  var toks=p.trim().split(/\s+/), out='', first=true;
  function put(pat,opt){ if(opt) out+='(?:\\s+'+pat+')?'; else { out+=(first?'':'\\s+')+pat; first=false; } }
  toks.forEach(function(t,i){
    if(/^\.\.\.$/.test(t)){ put(F_SLOT,true); return; }
    var paren=t.match(/^\(([^)]+)\)$/);
    if(paren){ put(fEsc(paren[1]),true); return; }              // (good) → 可有可無
    if(/^(one’s|one\'s|sb\.?|sth\.?|somebody|something|A|B)$/.test(t)){ put(F_SLOT,false); return; }
    var tail=/\.\.\.$/.test(t), core=t.replace(/\.\.\.$/,'');
    var pm=core.match(/^(.+?)\(([a-z]+)\)$/i);                  // habit(s) → habits?
    if(pm) put(fEsc(pm[1])+'(?:'+fEsc(pm[2])+')?',false);
    else put(first?fInflectAlt(core):fEsc(core),false);
    if(tail && i<toks.length-1) put(F_SLOT,true);               // 句中的 ... 才是插槽，結尾的丟掉
  });
  return new RegExp('\\b'+out+'(?!\\w)','i');
}
/* 片語表的括號寫法要兩種都算對：X (good) Y → 有 good、沒 good 都收；字尾 (s) 單複數都收 */
function fAccept(enField){
  var out={};
  (enField||'').split(/[\/;]/).forEach(function(f){
    f=f.trim(); if(!f) return;
    out[normEn(f)]=1;                                  // 括號內容保留（normEn 會脫掉括號）
    out[normEn(f.replace(/\([^)]*\)/g,' '))]=1;        // 括號內容整段拿掉
  });
  delete out['']; return Object.keys(out);
}
/* 例句挖空——總複習版：只留純底線，不透露首尾字母（單元練習才給提示，考試不給） */
function fBlank(sent, enField){
  var e=esc(sent), base=(enField||'').split(/[\/;]/).map(function(s){return s.trim()}).filter(Boolean);
  var tot=e.split(/\s+/).filter(Boolean).length;
  for(var i=0;i<base.length;i++){
    try{
      var m=e.match(new RegExp('\\b'+fEsc(base[i])+'(?!\\w)','i'));   // 原形優先（尾巴用 (?!\w) 而非 \b，句號結尾的固定用語也挖得到）
      if(!m) m=e.match(fPhraseRe(base[i]));                           // 再試彈性：字形變化＋插槽
      if(!m||!m[0].trim()) continue;
      var span=m[0].trim().split(/\s+/).length;
      if(span/tot>0.7 || (tot-span)<2) continue;                      // 挖太多剩沒幾個字 → 變猜謎，退回中文情境
      // 答案在句中出現兩次就別挖了（挖掉第一個、第二個原地洩題：「my favorite ＿＿book … the short story」）
      var rest=e.slice(0,m.index)+e.slice(m.index+m[0].length);
      if(new RegExp('\\b'+fEsc(m[0].trim())+'','i').test(rest)) continue;
      // ⚠️ 用 m.index 切片，不能用 e.replace(m[0],…)——String.replace 換的是「第一次出現」不是命中位置
      return {html:e.slice(0,m.index)+(/^\s/.test(m[0])?' ':'')+'<span class="cloze">＿＿＿＿</span>'+
                   (/\s$/.test(m[0])?' ':'')+e.slice(m.index+m[0].length),
              form:m[0].trim(), hit:true};
    }catch(_){}
  }
  return {html:e, form:'', hit:false};
}
/* 單字／片語：看完整例句 + 中文 + 詞性，自己把空格寫出來。沒有選項可以猜。 */
function fRunSpell(q){
  var body=document.getElementById('qbody'), fb=document.getElementById('fb'), it=q.it;
  var isP=(q.cat==='phrase');
  var cz=it.ex?fBlank(it.ex,it.en):null, useEx=!!(cz&&cz.hit);
  var forms=fAccept(it.en);
  var answer=useEx?cz.form:it.en.split(/[\/;]/)[0].trim();
  var stem;
  if(useEx){
    stem=fTag((isP?'片語':'單字')+'　看句子，把空格寫出來')+
      '<div class="exen cloze-sent" style="font-size:17px;line-height:2">'+cz.html+'</div>'+
      (it.exZh?'<div class="exzh">'+esc(it.exZh)+'</div>':'')+
      '<p class="muted" style="font-size:12.5px;margin:8px 0 0">中文：<b>'+esc(it.zh)+'</b>'+
      (it.pos?'　（'+esc(it.pos)+'）':'')+'</p>';
  } else {
    // 挖不到空（片語含 one's / A to B 這種模板）→ 給完整中文例句當情境，不是光丟一個中文詞
    stem=fTag((isP?'片語':'單字')+'　中 → 英，自己寫出來')+
      '<div class="zh">'+esc(it.zh)+(it.pos?'　<span class="muted" style="font-size:13px">'+esc(it.pos)+'</span>':'')+'</div>'+
      (it.exZh?'<div class="exzh" style="margin-top:8px">情境：'+esc(it.exZh)+'</div>':'')+
      '<p class="muted" style="font-size:12.5px;margin:6px 0 0">'+
      (isP?words(answer).length+' 個字'+(/\(|one\'s|sb|sth/.test(it.en)?'　（照片語表寫法，如 one\'s）':''):answer.replace(/\s/g,'').length+' 個字母')+'</p>';
  }
  body.innerHTML=stem+
    '<input class="spell" id="sp" autocomplete="off" autocapitalize="off" spellcheck="false" placeholder="'+(isP?'寫出片語':'寫出英文')+'">'+
    '<button class="btn wide" id="ck" style="margin-top:10px">檢查</button>';
  var ip=document.getElementById('sp'); ip.focus();
  ip.onkeydown=function(e){ if(e.key==='Enter'){ e.preventDefault(); ck(); } };
  document.getElementById('ck').onclick=ck;
  function ck(){
    var v=ip.value.trim(); if(!v){ toast('先寫寫看'); return }
    // ⚠️ 有挖空時只收句子真正要的那一形。以前連 fAccept 的原形都收 → L6 過去式單元
    //    「I ___ in the pool yesterday.」填 swim 竟然算對＝直接教錯（老師實測 18 題中招）。
    var n=normEn(v), ok = useEx ? (n===normEn(answer)) : (n===normEn(answer)||forms.indexOf(n)>=0);
    // 只差一個字母 → 給一次重寫機會（系統本來就算得出 editDist=1、還跳「很接近了」卻給 0 分，
    // 對拼字弱的小孩是純懲罰）。第二次寫對算他對，但仍收進錯題本——拼法還不熟就是要練。
    if(!ok && !q._retried && normEn(answer).length>=4 && editDist(n, normEn(answer))===1){
      q._retried=1; q._alsoWrong=1;
      fb.innerHTML='<div class="hintbox" style="display:block">✏️ <b>只差一個字母</b>，再寫一次看看（這題會收進錯題本）</div>';
      ip.value=''; ip.focus(); return;
    }
    ip.disabled=true; document.getElementById('ck').disabled=true;
    fb.innerHTML='<div class="hintbox" style="display:block">'+
      (ok?(q._retried?'✅ 這次對了！拼法再多看兩眼':'✅ 寫對了！')
         :'❌ 正解：<b>'+esc(answer)+'</b>'+spellDiff(v,answer)+
        (useEx&&forms.indexOf(n)>=0?'<div class="muted" style="font-size:13px;margin-top:4px">'+
          '你寫的是原形，但這句要用 <b>'+esc(answer)+'</b> 這個形式。</div>':''))+
      (useEx?'<div class="muted" style="font-size:13px;margin-top:6px">'+hlWord(it.ex,it.en)+'</div>':'')+'</div>';
    speak(answer); fFinish(q, ok);
  }
}
/* ── 文法填空的提示 ──
   選項一拿掉，「My sister and I ___ dinner.」就從考文法變成猜字彙（cook? eat? make?）→ 無解。
   語意由「每題本來就有的中文」負責（fRunGFill 會顯示 it.zh）；提示只在答案有形變/語序空間時
   才補原形（never plays →（never / play）），提示＝答案時不給——否則照抄就得分。
   ⚠️ 原本有一套 G_FUNC/gAllFunc「純功能詞就不給提示」，是在沒發現資料有 zh 時硬幹的，已移除。 */
var G_NOSTRIP={}, G_ORD={first:'one',second:'two',third:'three',fourth:'four',fifth:'five',
  sixth:'six',seventh:'seven',eighth:'eight',ninth:'nine',tenth:'ten',eleventh:'eleven',twelfth:'twelve',
  thirteenth:'thirteen',twentieth:'twenty','twenty-third':'twenty-three','twenty-fifth':'twenty-five',
  thirtieth:'thirty','thirty-first':'thirty-one'};
var G_POSS={mine:'my',yours:'your',hers:'her',ours:'our',theirs:'their'};
var G_CONTR={"don't":['do','not'],"doesn't":['do','not'],"didn't":['do','not'],"isn't":['be','not'],
  "aren't":['be','not'],"wasn't":['be','not'],"weren't":['be','not'],"can't":['can','not'],
  "won't":['will','not'],"it's":['it','be'],"that's":['that','be'],"what's":['what','be'],
  "there's":['there','be'],"let's":['let','us']};
var G_BE={is:1,are:1,am:1,was:1,were:1,been:1,being:1};
var G_LEMMA={goes:'go',went:'go',gone:'go',has:'have',had:'have',does:'do',did:'do',done:'do',made:'make',
  took:'take',taken:'take',gave:'give',given:'give',bought:'buy',kept:'keep',led:'lead',swam:'swim',
  threw:'throw',broke:'break',got:'get',wrote:'write',ate:'eat',came:'come',ran:'run',sat:'sit',
  stood:'stand',taught:'teach',thought:'think',wore:'wear',felt:'feel',found:'find',said:'say',saw:'see'};
('always sometimes this his its us yes bus glass class pass miss less news').split(' ').forEach(function(w){G_NOSTRIP[w]=1});
function gClean(w){ return w.replace(/[.,!?]/g,''); }
function gLemma(w){
  var c=gClean(w), k=c.toLowerCase();
  if(G_ORD[k]) return G_ORD[k];                       // fourth → four（考序數變化）
  if(G_POSS[k]) return G_POSS[k];                     // ours → our（考所有格代名詞）
  if(/'s$/.test(k)) return c.slice(0,-2);             // Melody's → Melody（考所有格）
  if(G_BE[k]) return 'be';
  if(G_LEMMA[k]) return G_LEMMA[k];
  if(G_NOSTRIP[k]) return c;                          // always 不能被砍成 alway
  if(/ies$/.test(k)&&k.length>4) return k.slice(0,-3)+'y';
  if(/(ches|shes|sses|xes)$/.test(k)) return k.slice(0,-2);
  if(/[^s]s$/.test(k)&&k.length>3) return k.slice(0,-1);
  if(/ing$/.test(k)&&k.length>5){ var b=k.slice(0,-3); return /([^aeiou])\1$/.test(b)?b.slice(0,-1):b; }
  if(/ed$/.test(k)&&k.length>4){ var e=k.slice(0,-2); return /([^aeiou])\1$/.test(e)?e.slice(0,-1):e; }
  return c;                                           // 沒變化就保留原大小寫：Friday 不要變成 friday
}
/* 提示有沒有意義：提示＝答案就等於送分，不如不給（語意交給中文） */
function gShowHint(ans){
  var h=gHint(ans);
  return (!!h && normEn(h.replace(/ \/ /g,' '))!==normEn(ans)) ? h : '';
}
function gHint(ans){
  var out=[];
  ans.split(/\s+/).forEach(function(t){
    var k=gClean(t).toLowerCase();
    if(G_CONTR[k]){ G_CONTR[k].forEach(function(x){out.push(x)}); return; }
    if(gClean(t)) out.push(gLemma(t));
  });
  var u=[]; out.forEach(function(x){ if(u.indexOf(x)<0) u.push(x) });
  return u.sort().join(' / ');
}
/* 句型轉換：段考非選最常考的題型——看原句，把「真正改變的地方」挖空填出來(見 diffBlankRange)。

  var inputs=blankIdx.map(function(_,k){ return document.getElementById('sfb'+k); });
  inputs[0].focus();
  inputs.forEach(function(ip,k){

  document.getElementById('ck').onclick=ck;

    inputs.forEach(function(ip){ip.disabled=true;}); document.getElementById('ck').disabled=true;

    blankIdx.forEach(function(bi,k){

      (allOk?'✅ 完全正確':'❌ 正解：<b>'+esc(it.en)+'</b>')+'</div>';

    var w=S.wrong[k];
    var isDue=(w.due||0)<=Date.now();
    var en=(w.en||''); if(en.length>52) en=en.slice(0,52)+'…';
    return '<div class="exline"><span class="pill">'+CATN[w.cat]+'</span>'+
      '<span class="pill">L'+w.lesson+'</span>'+
      (isDue?'<span class="pill gold">待複習</span>':'')+
      '<b class="en">'+esc(en)+'</b>'+
      (w.zh?'<div class="muted" style="font-size:13px">'+esc(w.zh)+'</div>':'')+'</div>';
  }

  if(grp==='type'){
    ['vocab','phrase','gram','trans'].forEach(function(c){
      var keys=act.filter(function(k){return S.wrong[k].cat===c});
      if(!keys.length) return;
      var d=keys.filter(function(k){return (S.wrong[k].due||0)<=Date.now()});
      h+='<div class="card"><div class="hd"><div class="t">'+CATICON[c]+' '+CATN[c]+'（'+keys.length+'）</div>'+
         '<button class="btn sm '+(d.length?'':'soft')+'" data-c="'+c+'" data-l="0">'+
         (d.length?('複習 '+d.length):('練 '+keys.length))+'</button></div>';
      // 細分類：文法依文法點、單字依詞性
      var sub=subClass(c,keys); if(sub) h+=sub;
      // 依課再拆一排
      h+='<div class="row" style="flex-wrap:wrap;margin:6px 0 2px">';
      lessonsOf().forEach(function(L){
        var n=keys.filter(function(k){return S.wrong[k].lesson===L.id}).length;
        if(!n) return;
        h+='<button class="chip" data-c="'+c+'" data-l="'+L.id+'">'+esc(L.name)+' '+n+'</button>';
      });
      h+='</div>';
      h+=keys.slice(0,12).map(itemRow).join('');
      if(keys.length>12) h+='<div class="muted" style="font-size:12.5px;margin-top:6px">…另有 '+(keys.length-12)+' 題</div>';
      h+='</div>';
    });
  } else {
    lessonsOf().forEach(function(L){
      var lid=L.id;
      var keys=act.filter(function(k){return S.wrong[k].lesson===lid});
      if(!keys.length) return;
      h+='<div class="card"><div class="hd"><div class="t">'+esc(L.name)+
         ' <span class="muted" style="font-weight:400;font-size:13px">'+esc(L.zh||'')+'</span>（'+keys.length+'）</div></div>';
      h+='<div class="row" style="flex-wrap:wrap;margin-bottom:4px">';
      ['vocab','phrase','gram','trans'].forEach(function(c){
        var a=keys.filter(function(k){return S.wrong[k].cat===c});
        if(!a.length) return;
        var d=a.filter(function(k){return (S.wrong[k].due||0)<=Date.now()});
        h+='<button class="btn sm '+(d.length?'':'soft')+'" data-l="'+lid+'" data-c="'+c+'">'+
           CATN[c]+'　'+(d.length?('複習 '+d.length):('練 '+a.length))+'</button>';
      });
      h+='</div>';
      h+=keys.slice(0,15).map(itemRow).join('');
      if(keys.length>15) h+='<div class="muted" style="font-size:12.5px;margin-top:6px">…另有 '+(keys.length-15)+' 題</div>';
      h+='</div>';
    });
  }
  app.innerHTML=h;
  Array.prototype.forEach.call(document.getElementById('rgrp').querySelectorAll('button'),function(b){
    b.onclick=function(){S.revGroup=b.dataset.g;save();paint()};
  });
  Array.prototype.forEach.call(app.querySelectorAll('[data-c]'),function(b){
    b.onclick=function(){startReview(b.dataset.c, +b.dataset.l||0)};
  });
}
var CATICON={vocab:'📘',phrase:'🧩',gram:'📗',trans:'✍️'};
function posOf(en,lesson){
  var arr=(DB.vocab||{})[LK(lesson)]||[];
  for(var i=0;i<arr.length;i++) if(arr[i].w===en) return arr[i].pos||'';
  return '';
}
/* 錯題細分類：文法→文法點、單字→詞性 */
function subClass(c,keys){
  if(c==='gram'){
    var by={};
    keys.forEach(function(k){
      var it=gquizById(k); if(!it) return;
      var g=((DB.grammar||{})[LK(it.lesson)]||[])[it.gp];
      var t=g?g.title:'其他';
      by[t]=(by[t]||0)+1;
    });
    var parts=Object.keys(by).map(function(t){var s=t.length>16?t.slice(0,16)+'…':t;return esc(s)+' '+by[t]});
    return parts.length?'<div class="muted" style="font-size:12px;margin:2px 0">依文法點：'+parts.join('・')+'</div>':'';
  }
  if(c==='vocab'){
    var byp={};
    keys.forEach(function(k){ var p=posOf(S.wrong[k].en,S.wrong[k].lesson)||'其他'; byp[p]=(byp[p]||0)+1; });
    var pp=Object.keys(byp).map(function(p){return esc(p)+' '+byp[p]});
    return pp.length?'<div class="muted" style="font-size:12px;margin:2px 0">依詞性：'+pp.join('・')+'</div>':'';
  }
  return '';
}
function DIRN(d){return {en2zh:'英→中',zh2en:'中→英',spell:'拼字',trans:'中翻英',sform:'句型轉換',gram:'文法'}[d]||d}
function startReview(cat, lesson){
  var flt=function(k){return !lesson||S.wrong[k].lesson===lesson;};
  var keys=wrongDue(cat).filter(flt);
  if(!keys.length) keys=wrongActive(cat).filter(flt);
  if(!keys.length){toast('沒有待複習的題目');return}
  if(cat==='gram'){
    // ⚠️ 錯題重考不給選擇題猜：能填空的改「填空打字」，不能填的才留選擇（且要跨場次才畢業）
    var gitems=keys.map(function(k){return gquizById(k)}).filter(Boolean);
    if(!gitems.length){toast('找不到對應題目');return}
    F={sc:{k:'wrong-gram', name:'文法複習', lessons:[], n:gitems.length},
       items:shuffle(gitems).map(function(x){return {t:(gramTypeable(x)?'gfill':'gram'), cat:'gram', it:x}}),
       i:0, right:0, answered:0, review:true};
    go('finalRun');
    return;
  }
  if(cat==='trans'){
    var ids={}; keys.forEach(function(k){ids[k]=1});
    var items=(DB.translate||[]).filter(function(t){return ids[t.id]});
    if(!items.length){toast('找不到對應句子');return}
    startTrans({items:shuffle(items)});
    return;
  }
  if(cat==='sform'){                       // 句型轉換：借總複習的作答流程只考這幾題
    var sitems=keys.map(function(k){return sfById(k)}).filter(Boolean);
    if(!sitems.length){toast('找不到對應題目');return}
    F={sc:{k:'wrong-sform', name:'句型轉換複習', lessons:[], n:sitems.length},
       items:shuffle(sitems).map(function(x){return {t:'sform',cat:'sform',it:x}}),
       i:0, right:0, answered:0, review:true};
    go('finalRun');
    return;
  }
  // 單字/片語錯題：⚠️一律「看中文拼出英文」（打字），不給英中/中英選擇題猜。
  //   打字產出比原本答錯的辨識更難 → 寫得出來才算真的會（連對 2 次畢業）。
  var subset=shuffle(keys.map(function(k){
    var w=S.wrong[k]; return {id:k, en:w.en, zh:w.zh, lesson:w.lesson, cat:w.cat};
  }));
  toast('錯題重考：看中文拼出英文（'+subset.length+' 題）');
  startQuiz(cat, null, 'spell', subset);
}

/* ===== 版本更新橫幅 =====
   缺這段的話，等待中的新 Service Worker 永遠不會接管，
   已把 App 加到桌面的孩子就一直停在第一次快取的舊版，任何修正都送不到。 */
function showUpdateBar(reg){
  if(document.getElementById('updBar')) return;
  var bar=document.createElement('div');
  bar.id='updBar';
  bar.innerHTML='<span>有新版本可以用了 🎉</span><button type="button" id="updBtn">立即更新</button>';
  document.body.appendChild(bar);
  document.getElementById('updBtn').onclick=function(){
    if(reg.waiting) reg.waiting.postMessage('SKIP_WAITING');
    setTimeout(function(){location.reload()},400);
  };
}
if('serviceWorker' in navigator){
  window.addEventListener('load',function(){
    navigator.serviceWorker.register('sw.js').then(function(reg){
      if(!reg) return;
      if(reg.waiting) showUpdateBar(reg);
      reg.addEventListener('updatefound',function(){
        var nw=reg.installing; if(!nw) return;
        nw.addEventListener('statechange',function(){
          if(nw.state==='installed' && navigator.serviceWorker.controller) showUpdateBar(reg);
        });
      });
    }).catch(function(){});
    var reloaded=false;
    navigator.serviceWorker.addEventListener('controllerchange',function(){
      if(reloaded) return; reloaded=true; location.reload();
    });
  });
}
